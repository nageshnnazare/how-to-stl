/**
 * @brief Custom implementation of std::set using Red-Black Tree
 * 
 * Set is an ordered container of unique elements.
 * 
 * Key characteristics:
 * - Elements are sorted (default: ascending order)
 * - No duplicate elements
 * - O(log n) insertion, deletion, and search
 * - Bidirectional iterators
 * - Implemented using Red-Black Tree for balanced operations
 */

template&lt;typename T, typename Compare = std::less&lt;T&gt;&gt;
class Set {
private:
    // Red-Black Tree node colors
    enum Color { RED, BLACK };

    // Node structure
    struct Node {
        T value;
        Color color;
        Node* left;
        Node* right;
        Node* parent;

        Node(const T&amp; val, Color c = RED)
            : value(val), color(c), left(nullptr), right(nullptr), parent(nullptr) {}
    };

    Node* root_;
    Node* nil_;  // Sentinel node (replaces nullptr)
    size_t size_;
    Compare comp_;

    /**
     * @brief Initialize nil sentinel
     */
    void init_nil() {
        nil_ = new Node(T(), BLACK);
        nil_-&gt;left = nil_;
        nil_-&gt;right = nil_;
        nil_-&gt;parent = nil_;
        root_ = nil_;
    }

    /**
     * @brief Left rotation around node x
     */
    void rotate_left(Node* x) {
        Node* y = x-&gt;right;
        x-&gt;right = y-&gt;left;

        if (y-&gt;left != nil_) {
            y-&gt;left-&gt;parent = x;
        }

        y-&gt;parent = x-&gt;parent;

        if (x-&gt;parent == nil_) {
            root_ = y;
        } else if (x == x-&gt;parent-&gt;left) {
            x-&gt;parent-&gt;left = y;
        } else {
            x-&gt;parent-&gt;right = y;
        }

        y-&gt;left = x;
        x-&gt;parent = y;
    }

    /**
     * @brief Right rotation around node x
     */
    void rotate_right(Node* x) {
        Node* y = x-&gt;left;
        x-&gt;left = y-&gt;right;

        if (y-&gt;right != nil_) {
            y-&gt;right-&gt;parent = x;
        }

        y-&gt;parent = x-&gt;parent;

        if (x-&gt;parent == nil_) {
            root_ = y;
        } else if (x == x-&gt;parent-&gt;right) {
            x-&gt;parent-&gt;right = y;
        } else {
            x-&gt;parent-&gt;left = y;
        }

        y-&gt;right = x;
        x-&gt;parent = y;
    }

    /**
     * @brief Fix Red-Black Tree properties after insertion
     */
    void insert_fixup(Node* z) {
        while (z-&gt;parent-&gt;color == RED) {
            if (z-&gt;parent == z-&gt;parent-&gt;parent-&gt;left) {
                Node* y = z-&gt;parent-&gt;parent-&gt;right;
                if (y-&gt;color == RED) {
                    z-&gt;parent-&gt;color = BLACK;
                    y-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    z = z-&gt;parent-&gt;parent;
                } else {
                    if (z == z-&gt;parent-&gt;right) {
                        z = z-&gt;parent;
                        rotate_left(z);
                    }
                    z-&gt;parent-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    rotate_right(z-&gt;parent-&gt;parent);
                }
            } else {
                Node* y = z-&gt;parent-&gt;parent-&gt;left;
                if (y-&gt;color == RED) {
                    z-&gt;parent-&gt;color = BLACK;
                    y-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    z = z-&gt;parent-&gt;parent;
                } else {
                    if (z == z-&gt;parent-&gt;left) {
                        z = z-&gt;parent;
                        rotate_right(z);
                    }
                    z-&gt;parent-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    rotate_left(z-&gt;parent-&gt;parent);
                }
            }
        }
        root_-&gt;color = BLACK;
    }

    /**
     * @brief Transplant subtree
     */
    void transplant(Node* u, Node* v) {
        if (u-&gt;parent == nil_) {
            root_ = v;
        } else if (u == u-&gt;parent-&gt;left) {
            u-&gt;parent-&gt;left = v;
        } else {
            u-&gt;parent-&gt;right = v;
        }
        v-&gt;parent = u-&gt;parent;
    }

    /**
     * @brief Find minimum node in subtree
     */
    Node* minimum(Node* node) const {
        while (node-&gt;left != nil_) {
            node = node-&gt;left;
        }
        return node;
    }

    /**
     * @brief Find maximum node in subtree
     */
    Node* maximum(Node* node) const {
        while (node-&gt;right != nil_) {
            node = node-&gt;right;
        }
        return node;
    }

    /**
     * @brief Fix Red-Black Tree properties after deletion
     */
    void delete_fixup(Node* x) {
        while (x != root_ &amp;&amp; x-&gt;color == BLACK) {
            if (x == x-&gt;parent-&gt;left) {
                Node* w = x-&gt;parent-&gt;right;
                if (w-&gt;color == RED) {
                    w-&gt;color = BLACK;
                    x-&gt;parent-&gt;color = RED;
                    rotate_left(x-&gt;parent);
                    w = x-&gt;parent-&gt;right;
                }
                if (w-&gt;left-&gt;color == BLACK &amp;&amp; w-&gt;right-&gt;color == BLACK) {
                    w-&gt;color = RED;
                    x = x-&gt;parent;
                } else {
                    if (w-&gt;right-&gt;color == BLACK) {
                        w-&gt;left-&gt;color = BLACK;
                        w-&gt;color = RED;
                        rotate_right(w);
                        w = x-&gt;parent-&gt;right;
                    }
                    w-&gt;color = x-&gt;parent-&gt;color;
                    x-&gt;parent-&gt;color = BLACK;
                    w-&gt;right-&gt;color = BLACK;
                    rotate_left(x-&gt;parent);
                    x = root_;
                }
            } else {
                Node* w = x-&gt;parent-&gt;left;
                if (w-&gt;color == RED) {
                    w-&gt;color = BLACK;
                    x-&gt;parent-&gt;color = RED;
                    rotate_right(x-&gt;parent);
                    w = x-&gt;parent-&gt;left;
                }
                if (w-&gt;right-&gt;color == BLACK &amp;&amp; w-&gt;left-&gt;color == BLACK) {
                    w-&gt;color = RED;
                    x = x-&gt;parent;
                } else {
                    if (w-&gt;left-&gt;color == BLACK) {
                        w-&gt;right-&gt;color = BLACK;
                        w-&gt;color = RED;
                        rotate_left(w);
                        w = x-&gt;parent-&gt;left;
                    }
                    w-&gt;color = x-&gt;parent-&gt;color;
                    x-&gt;parent-&gt;color = BLACK;
                    w-&gt;left-&gt;color = BLACK;
                    rotate_right(x-&gt;parent);
                    x = root_;
                }
            }
        }
        x-&gt;color = BLACK;
    }

    /**
     * @brief Find node with given value
     */
    Node* find_node(const T&amp; value) const {
        Node* current = root_;
        while (current != nil_) {
            if (comp_(value, current-&gt;value)) {
                current = current-&gt;left;
            } else if (comp_(current-&gt;value, value)) {
                current = current-&gt;right;
            } else {
                return current;
            }
        }
        return nil_;
    }

    /**
     * @brief Deep copy tree
     */
    Node* copy_tree(Node* node, Node* parent, Node* other_nil) {
        if (node == other_nil) {
            return nil_;
        }

        Node* new_node = new Node(node-&gt;value, node-&gt;color);
        new_node-&gt;parent = parent;
        new_node-&gt;left = copy_tree(node-&gt;left, new_node, other_nil);
        new_node-&gt;right = copy_tree(node-&gt;right, new_node, other_nil);

        return new_node;
    }

    /**
     * @brief Delete tree recursively
     */
    void delete_tree(Node* node) {
        if (node != nil_) {
            delete_tree(node-&gt;left);
            delete_tree(node-&gt;right);
            delete node;
        }
    }

public:
    // Type aliases
    using value_type = T;
    using size_type = std::size_t;
    using reference = T&amp;;
    using const_reference = const T&amp;;

    // Iterator class
    class iterator {
    private:
        Node* node_;
        Node* nil_;
        const Set* set_;

        friend class Set;

        iterator(Node* n, Node* nil, const Set* s) : node_(n), nil_(nil), set_(s) {}

    public:
        iterator() : node_(nullptr), nil_(nullptr), set_(nullptr) {}

        const T&amp; operator*() const { return node_-&gt;value; }
        const T* operator-&gt;() const { return &amp;node_-&gt;value; }

        iterator&amp; operator++() {
            if (node_-&gt;right != nil_) {
                node_ = set_-&gt;minimum(node_-&gt;right);
            } else {
                Node* parent = node_-&gt;parent;
                while (parent != nil_ &amp;&amp; node_ == parent-&gt;right) {
                    node_ = parent;
                    parent = parent-&gt;parent;
                }
                node_ = parent;
            }
            return *this;
        }

        iterator operator++(int) {
            iterator tmp = *this;
            ++(*this);
            return tmp;
        }

        iterator&amp; operator--() {
            if (node_ == nil_) {
                node_ = set_-&gt;maximum(set_-&gt;root_);
            } else if (node_-&gt;left != nil_) {
                node_ = set_-&gt;maximum(node_-&gt;left);
            } else {
                Node* parent = node_-&gt;parent;
                while (parent != nil_ &amp;&amp; node_ == parent-&gt;left) {
                    node_ = parent;
                    parent = parent-&gt;parent;
                }
                node_ = parent;
            }
            return *this;
        }

        iterator operator--(int) {
            iterator tmp = *this;
            --(*this);
            return tmp;
        }

        bool operator==(const iterator&amp; other) const {
            return node_ == other.node_;
        }

        bool operator!=(const iterator&amp; other) const {
            return node_ != other.node_;
        }
    };

    using const_iterator = iterator;

    // ============================================================================
    // CONSTRUCTORS
    // ============================================================================

    /**
     * @brief Default constructor
     */
    Set() : root_(nullptr), nil_(nullptr), size_(0) {
        init_nil();
    }

    /**
     * @brief Construct from initializer list
     */
    Set(std::initializer_list&lt;T&gt; init) : Set() {
        for (const auto&amp; val : init) {
            insert(val);
        }
    }

    /**
     * @brief Copy constructor
     */
    Set(const Set&amp; other) : Set() {
        root_ = copy_tree(other.root_, nil_, other.nil_);
        size_ = other.size_;
    }

    /**
     * @brief Move constructor
     */
    Set(Set&amp;&amp; other) noexcept
        : root_(other.root_), nil_(other.nil_), size_(other.size_), comp_(other.comp_) {
        other.root_ = nullptr;
        other.nil_ = nullptr;
        other.size_ = 0;
        other.init_nil();
    }

    /**
     * @brief Destructor
     */
    ~Set() {
        clear();
        delete nil_;
    }

    // ============================================================================
    // ASSIGNMENT OPERATORS
    // ============================================================================

    /**
     * @brief Copy assignment
     */
    Set&amp; operator=(const Set&amp; other) {
        if (this != &amp;other) {
            clear();
            root_ = copy_tree(other.root_, nil_, other.nil_);
            size_ = other.size_;
        }
        return *this;
    }

    /**
     * @brief Move assignment
     */
    Set&amp; operator=(Set&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            clear();
            delete nil_;

            root_ = other.root_;
            nil_ = other.nil_;
            size_ = other.size_;
            comp_ = other.comp_;

            other.root_ = nullptr;
            other.nil_ = nullptr;
            other.size_ = 0;
            other.init_nil();
        }
        return *this;
    }

    // ============================================================================
    // ITERATORS
    // ============================================================================

    iterator begin() {
        if (root_ == nil_) {
            return iterator(nil_, nil_, this);
        }
        return iterator(minimum(root_), nil_, this);
    }

    const_iterator begin() const {
        if (root_ == nil_) {
            return const_iterator(nil_, nil_, this);
        }
        return const_iterator(minimum(root_), nil_, this);
    }

    iterator end() {
        return iterator(nil_, nil_, this);
    }

    const_iterator end() const {
        return const_iterator(nil_, nil_, this);
    }

    // ============================================================================
    // CAPACITY
    // ============================================================================

    bool empty() const noexcept {
        return size_ == 0;
    }

    size_type size() const noexcept {
        return size_;
    }

    // ============================================================================
    // MODIFIERS
    // ============================================================================

    /**
     * @brief Clear all elements
     */
    void clear() {
        delete_tree(root_);
        root_ = nil_;
        size_ = 0;
    }

    /**
     * @brief Insert element
     * @return pair of iterator and bool (true if inserted, false if already exists)
     */
    std::pair&lt;iterator, bool&gt; insert(const T&amp; value) {
        Node* parent = nil_;
        Node* current = root_;

        // Find insertion position
        while (current != nil_) {
            parent = current;
            if (comp_(value, current-&gt;value)) {
                current = current-&gt;left;
            } else if (comp_(current-&gt;value, value)) {
                current = current-&gt;right;
            } else {

                return {iterator(current, nil_, this), false};
            }

        Node* new_node = new Node(value, RED);
        new_node-&gt;left = nil_;
        new_node-&gt;right = nil_;
        new_node-&gt;parent = parent;

        // Insert node
        if (parent == nil_) {
            root_ = new_node;
        } else if (comp_(value, parent-&gt;value)) {
            parent-&gt;left = new_node;
        } else {
            parent-&gt;right = new_node;
        }

        // Fix Red-Black Tree properties
        insert_fixup(new_node);

        ++size_;
        return {iterator(new_node, nil_, this), true};
    }

    /**
     * @brief Erase element by value
     * @return number of elements erased (0 or 1)
     */
    size_type erase(const T&amp; value) {
        Node* z = find_node(value);
        if (z == nil_) {
            return 0;
        }

        Node* y = z;
        Node* x;
        Color y_original_color = y-&gt;color;

        if (z-&gt;left == nil_) {
            x = z-&gt;right;
            transplant(z, z-&gt;right);
        } else if (z-&gt;right == nil_) {
            x = z-&gt;left;
            transplant(z, z-&gt;left);
        } else {
            y = minimum(z-&gt;right);
            y_original_color = y-&gt;color;
            x = y-&gt;right;

            if (y-&gt;parent == z) {
                x-&gt;parent = y;
            } else {
                transplant(y, y-&gt;right);
                y-&gt;right = z-&gt;right;
                y-&gt;right-&gt;parent = y;
            }

            transplant(z, y);
            y-&gt;left = z-&gt;left;
            y-&gt;left-&gt;parent = y;
            y-&gt;color = z-&gt;color;
        }

        if (y_original_color == BLACK) {
            delete_fixup(x);
        }

        delete z;
        --size_;
        return 1;
    }

    /**
     * @brief Erase element by iterator
     */
    iterator erase(iterator pos) {
        iterator next = pos;
        ++next;
        erase(*pos);
        return next;
    }

    // ============================================================================
    // LOOKUP
    // ============================================================================

    /**
     * @brief Find element
     * @return iterator to element, or end() if not found
     */
    iterator find(const T&amp; value) {
        Node* node = find_node(value);
        return iterator(node, nil_, this);
    }

    const_iterator find(const T&amp; value) const {
        Node* node = find_node(value);
        return const_iterator(node, nil_, this);
    }

    /**
     * @brief Count occurrences of value (0 or 1 for set)
     */
    size_type count(const T&amp; value) const {
        return find_node(value) != nil_ ? 1 : 0;
    }

    /**
     * @brief Check if value exists
     */
    bool contains(const T&amp; value) const {
        return find_node(value) != nil_;
    }
};

<h3 id="reference-counting-rules">Reference Counting Rules</h3>
<ol>
<li>
<p><strong>Shared Count</strong>: Number of <code>SharedPtr</code> instances
   - Incremented on copy
   - Decremented on destruction/reset
   - Object deleted when reaches 0</p>
</li>
<li>

   - Incremented when <code>WeakPtr</code> created
   - Decremented when <code>WeakPtr</code> destroyed

</li>

<h3 id="thread-safety">Thread Safety</h3>
<p><strong>What IS thread-safe:</strong>
- Reference count increments/decrements (atomic operations)
- Multiple threads can own separate <code>SharedPtr</code> to same object
- Concurrent read-only access to managed object</p>
<p><strong>What is NOT thread-safe:</strong>
- Modifying the managed object (requires external synchronization)
- Concurrent modification of same <code>SharedPtr</code> instance</p>

// Thread 2

// Both threads modifying the Data object
// NOT SAFE - need mutex!
</code></pre>
<h2 id="common-patterns">Common Patterns</h2>
<h3 id="1-breaking-circular-references">1. Breaking Circular References</h3>
<p><strong>Problem:</strong></p>
<pre><code class="language-cpp">// BAD: Memory leak!

    SharedPtr&lt;Node&gt; child_;   // Strong reference

<h3 id="2-cache-pattern">2. Cache Pattern</h3>

<h3 id="3-observer-pattern">3. Observer Pattern</h3>
<pre><code class="language-cpp">class Subject {
    std::vector&lt;WeakPtr&lt;Observer&gt;&gt; observers_;
public:
    void notify() {
        for (auto&amp; weak : observers_) {
            if (auto observer = weak.lock()) {
                observer-&gt;update();
            }
        }
    }
};
</code></pre>
<h2 id="performance-considerations">Performance Considerations</h2>
<h3 id="memory-overhead">Memory Overhead</h3>
<ul>
<li><strong>unique_ptr</strong>: 8 bytes (just pointer)</li>
<li><strong>shared_ptr</strong>: 16 bytes (pointer + control block pointer)</li>
<li>Plus control block: ~24-32 bytes (counts + deleter)</li>
</ul>
<h3 id="runtime-overhead">Runtime Overhead</h3>
<ul>
<li><strong>Copy</strong>: Atomic increment (~10-50 CPU cycles)</li>
<li><strong>Destruction</strong>: Atomic decrement + conditional delete</li>
<li><strong>Dereference</strong>: Same as raw pointer (no overhead)</li>
<li><strong>Lock (weak_ptr)</strong>: Atomic compare-and-swap loop</li>
</ul>
<h3 id="optimization-makeshared">Optimization: makeShared</h3>
<p><strong>Two allocations (using constructor):</strong></p>
<pre><code class="language-cpp">SharedPtr&lt;T&gt; ptr(new T());  // Allocate T, then allocate control block
</code></pre>
<p><strong>One allocation (using makeShared - better!):</strong></p>
<pre><code class="language-cpp">auto ptr = makeShared&lt;T&gt;();  // Single allocation for T + control block
</code></pre>
<p>Note: This implementation uses two allocations. Production <code>std::shared_ptr</code> optimizes to one.</p>
<h2 id="when-to-use-shared_ptr">When to Use shared_ptr</h2>
<p>✅ <strong>Use shared_ptr when:</strong>
- Ownership is shared among multiple parts of code
- Lifetime is managed collectively
- Need automatic cleanup with multiple owners
- Building caches or object pools
- Implementing observer patterns</p>
<p>❌ <strong>Don&rsquo;t use shared_ptr when:</strong>
- Ownership is clear and exclusive (use <code>unique_ptr</code>)
- Performance is critical and overhead matters
- Object has automatic/static storage
- Working with existing non-smart-pointer APIs</p>
<h2 id="comparison-with-unique_ptr">Comparison with unique_ptr</h2>
<p>Choose between them based on ownership model:</p>
<pre><code class="language-cpp">// Clear single owner → unique_ptr

moduleB.setConfig(config);  // Share
moduleC.setConfig(config);  // Share

<pre><code class="language-cpp">#ifndef SHARED_PTR_HPP
#define SHARED_PTR_HPP

#include &lt;type_traits&gt;  // for std::remove_extent, std::is_array
#include &lt;cstddef&gt;      // for std::nullptr_t
#include &lt;atomic&gt;       // for std::atomic (thread-safe reference counting)

/**
 * @brief Custom implementation of std::shared_ptr
 * 
 * shared_ptr is a smart pointer that retains shared ownership of an object through a pointer.
 * Multiple shared_ptr instances can own the same object. The object is destroyed when:
 * - The last remaining shared_ptr owning the object is destroyed, OR
 * - The last remaining shared_ptr owning the object is assigned another pointer
 * 
 * Key characteristics:
 * - Shared ownership: Multiple shared_ptr can own the same object
 * - Reference counting: Keeps track of how many shared_ptr own the object
 * - Thread-safe counting: Reference count updates are atomic
 * - Copyable: Can be copied to share ownership
 * - Moveable: Can be moved for efficiency
 */

// Forward declarations
template&lt;typename T&gt; class SharedPtr;
template&lt;typename T&gt; class WeakPtr;

/**
 * @brief Control block that manages reference counting and deletion
 * 
 * This is the heart of shared_ptr. It stores:
 * - The managed pointer
 * - Strong reference count (number of shared_ptr instances)
 * - Weak reference count (number of weak_ptr instances)
 * - The deleter function
 */
template&lt;typename T, typename Deleter&gt;
class ControlBlock {
private:
    T* ptr_;                              // Pointer to managed object
    std::atomic&lt;long&gt; shared_count_;      // Strong reference count
    std::atomic&lt;long&gt; weak_count_;        // Weak reference count
    Deleter deleter_;                     // Deleter for the managed object

public:
    /**
     * @brief Construct control block with pointer and deleter
     */
    ControlBlock(T* ptr, Deleter deleter)
        : ptr_(ptr)
        , shared_count_(1)       // Start with 1 shared owner
        , weak_count_(0)         // No weak owners initially
        , deleter_(deleter) {}

    /**
     * @brief Destructor - should only be called when both counts reach 0
     */
    ~ControlBlock() = default;

    // Prevent copying and moving
    ControlBlock(const ControlBlock&amp;) = delete;
    ControlBlock&amp; operator=(const ControlBlock&amp;) = delete;

    /**
     * @brief Increment shared reference count
     */
    void add_shared_ref() {
        shared_count_.fetch_add(1, std::memory_order_relaxed);
    }

    /**
     * @brief Decrement shared reference count
     * @return true if this was the last shared reference
     */
    bool release_shared_ref() {
        // Decrement and check if we're the last owner
        if (shared_count_.fetch_sub(1, std::memory_order_acq_rel) == 1) {
            // We were the last shared owner - delete the object
            if (ptr_) {
                deleter_(ptr_);
                ptr_ = nullptr;
            }

            // Now check if there are any weak references
            if (weak_count_.load(std::memory_order_acquire) == 0) {
                return true;  // No weak refs, can delete control block
            }
        }
        return false;
    }

    /**
     * @brief Increment weak reference count
     */
    void add_weak_ref() {
        weak_count_.fetch_add(1, std::memory_order_relaxed);
    }

    /**
     * @brief Decrement weak reference count
     * @return true if this was the last weak reference and no shared refs exist
     */
    bool release_weak_ref() {
        if (weak_count_.fetch_sub(1, std::memory_order_acq_rel) == 1) {
            // We were the last weak reference
            if (shared_count_.load(std::memory_order_acquire) == 0) {
                return true;  // No shared refs either, can delete control block
            }
        }
        return false;
    }

    /**
     * @brief Get current shared reference count
     */
    long use_count() const {
        return shared_count_.load(std::memory_order_acquire);
    }

     */

    bool try_add_shared_ref() {
        long count = shared_count_.load(std::memory_order_acquire);
        while (count &gt; 0) {

        return false;  // Object already deleted
    }

/**

template&lt;typename T&gt;
struct SharedPtrDeleter {
    void operator()(T* ptr) const {
        delete ptr;
    }

template&lt;typename T&gt;

private:

    template&lt;typename U&gt; friend class WeakPtr;

    SharedPtr(T* ptr, ControlBlock&lt;T, SharedPtrDeleter&lt;T&gt;&gt;* cb, bool add_ref = true)

    constexpr SharedPtr() noexcept : ptr_(nullptr), cb_(nullptr) {}

    constexpr SharedPtr(std::nullptr_t) noexcept : ptr_(nullptr), cb_(nullptr) {}

    SharedPtr(const SharedPtr&lt;U&gt;&amp; other) noexcept

    SharedPtr(SharedPtr&amp;&amp; other) noexcept
        : ptr_(other.ptr_), cb_(other.cb_) {

             typename = typename std::enable_if&lt;std::is_convertible&lt;U*, T*&gt;::value&gt;::type&gt;
    SharedPtr(SharedPtr&lt;U&gt;&amp;&amp; other) noexcept
        : ptr_(other.ptr_), cb_(reinterpret_cast&lt;ControlBlock&lt;T, SharedPtrDeleter&lt;T&gt;&gt;*&gt;(other.cb_)) {
        other.ptr_ = nullptr;
        other.cb_ = nullptr;
    }

    /**
     * @brief Construct from weak_ptr (aliasing constructor for WeakPtr::lock())
     */
    explicit SharedPtr(const WeakPtr&lt;T&gt;&amp; weak);

    // ============================================================================
    // DESTRUCTOR
    // ============================================================================

    /**
     * @brief Destructor
     * Decrements reference count and deletes object if this was the last owner
     */
    ~SharedPtr() {
        if (cb_) {
            if (cb_-&gt;release_shared_ref()) {
                // No more shared or weak references - delete control block
                delete cb_;
            }
        }
    }

    // ============================================================================
    // ASSIGNMENT OPERATORS
    // ============================================================================

    /**
     * @brief Copy assignment operator
     * Shares ownership with other
     */
    SharedPtr&amp; operator=(const SharedPtr&amp; other) noexcept {
        if (this != &amp;other) {
            // Create temporary to ensure proper cleanup even if exceptions occur
            SharedPtr temp(other);
            swap(temp);
        }
        return *this;
    }

    /**
     * @brief Copy assignment from compatible type
     */
    template&lt;typename U&gt;
    SharedPtr&amp; operator=(const SharedPtr&lt;U&gt;&amp; other) noexcept {
        SharedPtr temp(other);
        swap(temp);
        return *this;
    }

    /**
     * @brief Move assignment operator
     */
    SharedPtr&amp; operator=(SharedPtr&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            SharedPtr temp(std::move(other));
            swap(temp);
        }
        return *this;
    }

    /**
     * @brief Move assignment from compatible type
     */
    template&lt;typename U&gt;
    SharedPtr&amp; operator=(SharedPtr&lt;U&gt;&amp;&amp; other) noexcept {
        SharedPtr temp(std::move(other));
        swap(temp);
        return *this;
    }

    /**
     * @brief Assignment from nullptr
     * Resets to empty state
     */
    SharedPtr&amp; operator=(std::nullptr_t) noexcept {
        reset();
        return *this;
    }

    // ============================================================================
    // MODIFIERS
    // ============================================================================

    /**
     * @brief Replace the managed object
     * @param p New pointer to manage (default: nullptr)
     */
    void reset(T* p = nullptr) {
        if (p == ptr_) {
            return;  // Same pointer, nothing to do
        }

        SharedPtr temp(p);
        swap(temp);
    }

    /**
     * @brief Swap contents with another shared_ptr
     */
    void swap(SharedPtr&amp; other) noexcept {
        std::swap(ptr_, other.ptr_);
        std::swap(cb_, other.cb_);
    }

    // ============================================================================
    // OBSERVERS
    // ============================================================================

    /**
     * @brief Get the raw pointer without affecting ownership
     * @return Raw pointer to the managed object (or nullptr)
     */
    T* get() const noexcept {
        return ptr_;
    }

    /**
     * @brief Get the number of shared_ptr instances managing this object
     * @return Reference count (0 if empty)
     */
    long use_count() const noexcept {
        return cb_ ? cb_-&gt;use_count() : 0;
    }

    /**
     * @brief Check if this is the only shared_ptr managing the object
     * @return true if use_count() == 1
     */
    bool unique() const noexcept {
        return use_count() == 1;
    }

    /**
     * @brief Check if the shared_ptr manages an object
     * @return true if managing an object, false if empty
     */
    explicit operator bool() const noexcept {
        return ptr_ != nullptr;
    }

    // ============================================================================
    // DEREFERENCE OPERATORS
    // ============================================================================

    /**
     * @brief Dereference the managed object
     * Behavior is undefined if get() == nullptr
     */
    T&amp; operator*() const noexcept {
        return *ptr_;
    }

    /**
     * @brief Access member of the managed object
     * Behavior is undefined if get() == nullptr
     */
    T* operator-&gt;() const noexcept {
        return ptr_;

/**
 * @brief WeakPtr - non-owning observer of SharedPtr
 * 
 * weak_ptr holds a non-owning reference to an object managed by shared_ptr.
 * It must be converted to shared_ptr to access the object.
 * 
 * Use cases:
 * - Break circular references
 * - Cache objects without preventing deletion
 * - Observer pattern
 */
template&lt;typename T&gt;
class WeakPtr {
private:
    T* ptr_;                                    // Pointer to managed object
    ControlBlock&lt;T, SharedPtrDeleter&lt;T&gt;&gt;* cb_;  // Pointer to control block

    template&lt;typename U&gt; friend class SharedPtr;
    template&lt;typename U&gt; friend class WeakPtr;

public:
    // Type aliases
    using element_type = T;

    // ============================================================================
    // CONSTRUCTORS
    // ============================================================================

    /**
     * @brief Default constructor - creates empty weak_ptr
     */
    constexpr WeakPtr() noexcept : ptr_(nullptr), cb_(nullptr) {}

    /**
     * @brief Copy constructor from WeakPtr
     */
    WeakPtr(const WeakPtr&amp; other) noexcept
        : ptr_(other.ptr_), cb_(other.cb_) {
        if (cb_) {
            cb_-&gt;add_weak_ref();
        }
    }

    /**
     * @brief Copy constructor from SharedPtr
     * Creates a weak reference to the object owned by shared_ptr
     */
    WeakPtr(const SharedPtr&lt;T&gt;&amp; shared) noexcept
        : ptr_(shared.ptr_), cb_(shared.cb_) {
        if (cb_) {
            cb_-&gt;add_weak_ref();
        }
    }

    /**
     * @brief Move constructor
     */
    WeakPtr(WeakPtr&amp;&amp; other) noexcept
        : ptr_(other.ptr_), cb_(other.cb_) {
        other.ptr_ = nullptr;
        other.cb_ = nullptr;
    }

    // ============================================================================
    // DESTRUCTOR
    // ============================================================================

    /**
     * @brief Destructor
     * Decrements weak reference count
     */
    ~WeakPtr() {
        if (cb_) {
            if (cb_-&gt;release_weak_ref()) {
                // No more weak or shared references - delete control block
                delete cb_;
            }
        }
    }

    // ============================================================================
    // ASSIGNMENT OPERATORS
    // ============================================================================

    /**
     * @brief Copy assignment from WeakPtr
     */
    WeakPtr&amp; operator=(const WeakPtr&amp; other) noexcept {
        if (this != &amp;other) {
            WeakPtr temp(other);
            swap(temp);
        }
        return *this;
    }

    /**
     * @brief Copy assignment from SharedPtr
     */
    WeakPtr&amp; operator=(const SharedPtr&lt;T&gt;&amp; shared) noexcept {
        WeakPtr temp(shared);
        swap(temp);
        return *this;
    }

    /**
     * @brief Move assignment
     */
    WeakPtr&amp; operator=(WeakPtr&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            WeakPtr temp(std::move(other));
            swap(temp);
        }
        return *this;
    }

    // ============================================================================
    // MODIFIERS
    // ============================================================================

    /**
     * @brief Reset to empty state
     */
    void reset() noexcept {
        WeakPtr temp;
        swap(temp);
    }

    /**
     * @brief Swap contents with another weak_ptr
     */
    void swap(WeakPtr&amp; other) noexcept {
        std::swap(ptr_, other.ptr_);
        std::swap(cb_, other.cb_);
    }

    // ============================================================================
    // OBSERVERS
    // ============================================================================

    /**
     * @brief Get the number of shared_ptr instances managing the object
     * @return Reference count (0 if object was deleted)
     */
    long use_count() const noexcept {
        return cb_ ? cb_-&gt;use_count() : 0;
    }

    /**
     * @brief Check if the managed object was already deleted
     * @return true if the object was deleted (use_count() == 0)
     */
    bool expired() const noexcept {
        return use_count() == 0;
    }

    /**
     * @brief Create a shared_ptr that manages the observed object
     * @return shared_ptr that shares ownership of the object
     *         Empty shared_ptr if object was already deleted
     */
    SharedPtr&lt;T&gt; lock() const noexcept {
        if (cb_ &amp;&amp; cb_-&gt;try_add_shared_ref()) {
            // Successfully incremented shared count
            // Create SharedPtr and manually set members to avoid double-increment
            return SharedPtr&lt;T&gt;(ptr_, cb_, false);  // false = don't increment again
        }
        return SharedPtr&lt;T&gt;();  // Object was deleted, return empty
    }
};

// Implementation of SharedPtr constructor from WeakPtr
template&lt;typename T&gt;
SharedPtr&lt;T&gt;::SharedPtr(const WeakPtr&lt;T&gt;&amp; weak)
    : ptr_(nullptr), cb_(nullptr) {
    if (weak.cb_ &amp;&amp; weak.cb_-&gt;try_add_shared_ref()) {
        ptr_ = weak.ptr_;
        cb_ = weak.cb_;
    }
    // If try_add_shared_ref fails, remain empty
}

// ============================================================================
// COMPARISON OPERATORS
// ============================================================================

template&lt;typename T1, typename T2&gt;
bool operator==(const SharedPtr&lt;T1&gt;&amp; lhs, const SharedPtr&lt;T2&gt;&amp; rhs) {
    return lhs.get() == rhs.get();
}

template&lt;typename T1, typename T2&gt;
bool operator!=(const SharedPtr&lt;T1&gt;&amp; lhs, const SharedPtr&lt;T2&gt;&amp; rhs) {
    return !(lhs == rhs);
}

template&lt;typename T&gt;
bool operator==(const SharedPtr&lt;T&gt;&amp; ptr, std::nullptr_t) {
    return !ptr;
}

template&lt;typename T&gt;
bool operator==(std::nullptr_t, const SharedPtr&lt;T&gt;&amp; ptr) {
    return !ptr;
}

template&lt;typename T&gt;
bool operator!=(const SharedPtr&lt;T&gt;&amp; ptr, std::nullptr_t) {
    return static_cast&lt;bool&gt;(ptr);
}

template&lt;typename T&gt;
bool operator!=(std::nullptr_t, const SharedPtr&lt;T&gt;&amp; ptr) {
    return static_cast&lt;bool&gt;(ptr);
}

// HELPER FUNCTIONS
// ============================================================================

/**
 * @brief Swap two shared_ptr objects
 */
template&lt;typename T&gt;
void swap(SharedPtr&lt;T&gt;&amp; lhs, SharedPtr&lt;T&gt;&amp; rhs) noexcept {
    lhs.swap(rhs);
}

/**
 * @brief Swap two weak_ptr objects
 */
template&lt;typename T&gt;
void swap(WeakPtr&lt;T&gt;&amp; lhs, WeakPtr&lt;T&gt;&amp; rhs) noexcept {
    lhs.swap(rhs);
}

/**
 * @brief Create a shared_ptr (C++11 make_shared equivalent)
 * 
 * This is the preferred way to create shared_ptr objects because:
 * 1. It's exception-safe
 * 2. It's more concise
 * 3. It's more efficient (single allocation for object + control block)
 * 4. It avoids explicit use of 'new'
 * 
 * Note: This simple implementation does two allocations (object + control block)
 * A production implementation would do a single allocation for better performance
 */
template&lt;typename T, typename... Args&gt;
SharedPtr&lt;T&gt; makeShared(Args&amp;&amp;... args) {
    return SharedPtr&lt;T&gt;(new T(std::forward&lt;Args&gt;(args)...));
}

/**
 * @brief Static cast for shared_ptr
 */
template&lt;typename T, typename U&gt;
SharedPtr&lt;T&gt; static_pointer_cast(const SharedPtr&lt;U&gt;&amp; ptr) {
    T* result = static_cast&lt;T*&gt;(ptr.get());
    SharedPtr&lt;T&gt; ret;
    ret.ptr_ = result;
    ret.cb_ = reinterpret_cast&lt;ControlBlock&lt;T, SharedPtrDeleter&lt;T&gt;&gt;*&gt;(ptr.cb_);
    if (ret.cb_) {
        ret.cb_-&gt;add_shared_ref();
    }
    return ret;
}

/**
 * @brief Dynamic cast for shared_ptr
 */
template&lt;typename T, typename U&gt;
SharedPtr&lt;T&gt; dynamic_pointer_cast(const SharedPtr&lt;U&gt;&amp; ptr) {
    T* result = dynamic_cast&lt;T*&gt;(ptr.get());
    if (result) {
        SharedPtr&lt;T&gt; ret;
        ret.ptr_ = result;
        ret.cb_ = reinterpret_cast&lt;ControlBlock&lt;T, SharedPtrDeleter&lt;T&gt;&gt;*&gt;(ptr.cb_);
        if (ret.cb_) {
            ret.cb_-&gt;add_shared_ref();
        }
        return ret;
    }
    return SharedPtr&lt;T&gt;();  // Cast failed, return empty
}

#include &lt;cstddef&gt;
#include &lt;deque&gt;
#include &lt;utility&gt;

/**
 * @brief Stack implementation - LIFO (Last In, First Out) container adapter
 * 
 * Stack is a container adapter that provides LIFO data structure.
 * 
 * Key characteristics:
 * - Last In, First Out (LIFO) access
 * - O(1) push, pop, and top operations
 * - No iteration (only top element accessible)
 * - Built on top of underlying container (default: deque)
 */

template&lt;typename T, typename Container = std::deque&lt;T&gt;&gt;
class Stack {
private:
    Container c_;  // Underlying container

public:
    using value_type = typename Container::value_type;
    using size_type = typename Container::size_type;
    using reference = typename Container::reference;
    using const_reference = typename Container::const_reference;
    using container_type = Container;

    // ============================================================================
    // CONSTRUCTORS
    // ============================================================================

    /**
     * @brief Default constructor
     */
    Stack() : c_() {}

    /**
     * @brief Constructor with container
     */
    explicit Stack(const Container&amp; cont) : c_(cont) {}

    /**
     * @brief Constructor with move container
     */
    explicit Stack(Container&amp;&amp; cont) : c_(std::move(cont)) {}

    /**
     * @brief Copy constructor
     */
    Stack(const Stack&amp; other) : c_(other.c_) {}

    /**
     * @brief Move constructor
     */
    Stack(Stack&amp;&amp; other) noexcept : c_(std::move(other.c_)) {}

    /**
     * @brief Destructor
     */
    ~Stack() = default;

    // ============================================================================
    // ASSIGNMENT OPERATORS
    // ============================================================================

    /**
     * @brief Copy assignment
     */
    Stack&amp; operator=(const Stack&amp; other) {
        if (this != &amp;other) {
            c_ = other.c_;
        }
        return *this;
    }

    /**
     * @brief Move assignment
     */
    Stack&amp; operator=(Stack&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            c_ = std::move(other.c_);
        }
        return *this;
    }

    // ============================================================================
    // ELEMENT ACCESS
    // ============================================================================

    /**
     * @brief Access the top element
     * @return reference to top element
     */
    reference top() {
        return c_.back();
    }

    /**
     * @brief Access the top element (const)
     * @return const reference to top element
     */
    const_reference top() const {
        return c_.back();
    }

    // ============================================================================
    // CAPACITY
    // ============================================================================

    /**
     * @brief Check if stack is empty
     */
    bool empty() const noexcept {
        return c_.empty();
    }

    /**
     * @brief Get number of elements
     */
    size_type size() const noexcept {
        return c_.size();
    }

    // ============================================================================
    // MODIFIERS
    // ============================================================================

    /**
     * @brief Push element onto stack (copy)
     * Time complexity: O(1)
     */
    void push(const value_type&amp; value) {
        c_.push_back(value);
    }

    /**
     * @brief Push element onto stack (move)
     * Time complexity: O(1)
     */
    void push(value_type&amp;&amp; value) {
        c_.push_back(std::move(value));
    }

    /**
     * @brief Construct element in-place at top
     * Time complexity: O(1)
     */
    template&lt;typename... Args&gt;
    void emplace(Args&amp;&amp;... args) {
        c_.emplace_back(std::forward&lt;Args&gt;(args)...);
    }

    /**
     * @brief Remove top element
     * Time complexity: O(1)
     */
    void pop() {
        c_.pop_back();
    }

    /**
     * @brief Swap contents with another stack
     */
    void swap(Stack&amp; other) noexcept {
        std::swap(c_, other.c_);
    }

    // ============================================================================
    // COMPARISON OPERATORS
    // ============================================================================

    /**
     * @brief Equality comparison
     */
    friend bool operator==(const Stack&amp; lhs, const Stack&amp; rhs) {
        return lhs.c_ == rhs.c_;
    }

    /**
     * @brief Inequality comparison
     */
    friend bool operator!=(const Stack&amp; lhs, const Stack&amp; rhs) {
        return !(lhs == rhs);
    }

    /**
     * @brief Less than comparison
     */
    friend bool operator&lt;(const Stack&amp; lhs, const Stack&amp; rhs) {
        return lhs.c_ &lt; rhs.c_;
    }

    /**
     * @brief Less than or equal comparison
     */
    friend bool operator&lt;=(const Stack&amp; lhs, const Stack&amp; rhs) {
        return !(rhs &lt; lhs);
    }

    /**
     * @brief Greater than comparison
     */
    friend bool operator&gt;(const Stack&amp; lhs, const Stack&amp; rhs) {
        return rhs &lt; lhs;
    }

    /**
     * @brief Greater than or equal comparison
     */
    friend bool operator&gt;=(const Stack&amp; lhs, const Stack&amp; rhs) {
        return !(lhs &lt; rhs);
    }
};

/**
 * @brief Swap specialization
 */
template&lt;typename T, typename Container&gt;
void swap(Stack&lt;T, Container&gt;&amp; lhs, Stack&lt;T, Container&gt;&amp; rhs) noexcept {
    lhs.swap(rhs);
}

#endif // STACK_HPP

void example5_evaluate_postfix() {
    std::cout &lt;&lt; &quot;\\n=== Example 5: Evaluate Postfix Expression ===\\n&quot;;

        for (const auto&amp; token : tokens) {
            if (token == &quot;+&quot; || token == &quot;-&quot; || token == &quot;*&quot; || token == &quot;/&quot;) {
                int b = s.top(); s.pop();
                int a = s.top(); s.pop();

                else if (token == &quot;-&quot;) s.push(a - b);
                else if (token == &quot;*&quot;) s.push(a * b);
                else if (token == &quot;/&quot;) s.push(a / b);
            } else {
                s.push(std::stoi(token));
            }
        }

        return s.top();
    };

    std::vector&lt;std::string&gt; expr = {&quot;2&quot;, &quot;3&quot;, &quot;+&quot;, &quot;4&quot;, &quot;*&quot;};  // (2 + 3) * 4 = 20

void example6_undo_redo() {
    std::cout &lt;&lt; &quot;\\n=== Example 6: Undo/Redo System ===\\n&quot;;

    Stack&lt;std::string&gt; undo_stack;

    auto execute = [&amp;](const std::string&amp; action) {
        undo_stack.push(current_state);
        current_state = action;
        // Clear redo stack on new action
        while (!redo_stack.empty()) redo_stack.pop();

    auto undo = [&amp;]() {

            undo_stack.pop();
            std::cout &lt;&lt; &quot;  Undo to: &quot; &lt;&lt; (current_state.empty() ? &quot;(empty)&quot; : current_state) &lt;&lt; &quot;\\n&quot;;

    auto redo = [&amp;]() {
        if (!redo_stack.empty()) {
            undo_stack.push(current_state);
            current_state = redo_stack.top();
            redo_stack.pop();
            std::cout &lt;&lt; &quot;  Redo to: &quot; &lt;&lt; current_state &lt;&lt; &quot;\\n&quot;;
        }
    };

    execute(&quot;Type A&quot;);
    execute(&quot;Type B&quot;);
    execute(&quot;Type C&quot;);
    undo();
    undo();
    redo();
    execute(&quot;Type D&quot;);
}

void example7_dfs_traversal() {
    std::cout &lt;&lt; &quot;\\n=== Example 7: Depth-First Search (DFS) ===\\n&quot;;

    // Simple graph: 0 -&gt; 1, 2; 1 -&gt; 3, 4; 2 -&gt; 5
    auto dfs = [](int start, const std::vector&lt;std::vector&lt;int&gt;&gt;&amp; graph) {
        Stack&lt;int&gt; s;
        std::vector&lt;bool&gt; visited(graph.size(), false);

        s.push(start);
        std::cout &lt;&lt; &quot;  DFS order: &quot;;

        while (!s.empty()) {
            int node = s.top();
            s.pop();

            if (!visited[node]) {
                visited[node] = true;
                std::cout &lt;&lt; node &lt;&lt; &quot; &quot;;

                // Push children in reverse order for correct DFS
                for (int i = graph[node].size() - 1; i &gt;= 0; --i) {
                    if (!visited[graph[node][i]]) {
                        s.push(graph[node][i]);
                    }
                }
            }
        }
        std::cout &lt;&lt; &quot;\\n&quot;;
    };

    std::vector&lt;std::vector&lt;int&gt;&gt; graph = {
        {1, 2},    // 0
        {3, 4},    // 1
        {5},       // 2
        {},        // 3
        {},        // 4
        {}         // 5
    };

    dfs(0, graph);
}

void example8_min_stack() {

    struct MinStack {
        Stack&lt;int&gt; data;

                mins.push(x);
            }
        }

        void pop() {
            if (data.top() == mins.top()) {
                mins.pop();
            }
            data.pop();
        }

        int top() { return data.top(); }
        int get_min() { return mins.top(); }
    };

    ms.push(2);
    ms.push(7);
    ms.push(1);

<h3 id="small-string-optimization-sso">Small String Optimization (SSO)</h3>
<p><strong>Concept</strong>: Short strings (≤ 15 characters) are stored in a stack buffer, avoiding heap allocation.</p>
<pre><code class="language-cpp">class String {
private:
    static constexpr size_type SSO_CAPACITY = 15;

    char* data_;                    // Pointer to data
    size_type size_;               // Current size
    size_type capacity_;           // Allocated capacity
    char sso_buffer_[SSO_CAPACITY + 1];  // Stack buffer for SSO

    bool is_sso() const {

    }
};

<p><strong>Benefits</strong>:
- <strong>No heap allocation</strong> for short strings
- <strong>Better cache locality</strong>
- <strong>Faster construction/destruction</strong>
- <strong>Common case optimization</strong> (most strings are short)</p>
<p><strong>Example</strong>:</p>
<pre><code class="language-cpp">String s1 = &quot;Hello&quot;;           // Uses SSO (stack)

</code></pre>
<h3 id="memory-layout">Memory Layout</h3>
<pre><code>SSO String (≤ 15 chars):
┌─────────────────────────┐
│  data_  ───┐            │
│  size_ = 5 │            │
│  capacity_ = 15         │
│  sso_buffer_[16]        │
│  ↓ points here          │
│  &quot;Hello\\0...&quot;           │
└─────────────────────────┘
Stack only, no heap allocation

Heap String (&gt; 15 chars):
┌─────────────────────────┐        Heap:
│  data_  ────────────────┼───────→ &quot;Long string...\\0&quot;
│  size_ = 30             │
│  capacity_ = 30         │
│  sso_buffer_[16]        │
│  (unused)               │
└─────────────────────────┘
</code></pre>
<h3 id="move-semantics">Move Semantics</h3>
<p><strong>SSO Strings</strong>: Copied (cheap for short strings)</p>
<pre><code class="language-cpp">String s1 = &quot;Short&quot;;

<pre><code class="language-cpp">String s1 = &quot;Long string...&quot;;

<h3 id="capacity-management">Capacity Management</h3>
<p><strong>Geometric Growth</strong>: When appending requires more capacity:</p>
<pre><code class="language-cpp">new_capacity = old_capacity * 2;
</code></pre>
<p><strong>Benefits</strong>:

            std::strcpy(sso_buffer_, other.sso_buffer_);
            std::strcpy(other.sso_buffer_, temp);

// LINEAR ALLOCATOR TESTS

bool test_linear_basic_allocation() {
    LinearAllocator alloc(1024);

    void* ptr1 = alloc.allocate(100);
    ASSERT(ptr1 != nullptr, &quot;First allocation should succeed&quot;);
    ASSERT(alloc.used() &gt;= 100, &quot;Used memory should be at least 100&quot;);

    void* ptr2 = alloc.allocate(200);
    ASSERT(ptr2 != nullptr, &quot;Second allocation should succeed&quot;);
    ASSERT(ptr2 &gt; ptr1, &quot;Second pointer should be after first&quot;);

    return true;
}

bool test_linear_reset() {
    LinearAllocator alloc(1024);

    alloc.allocate(500);
    size_t used_before = alloc.used();
    ASSERT(used_before &gt; 0, &quot;Should have used memory&quot;);

    alloc.reset();
    ASSERT(alloc.used() == 0, &quot;Used should be 0 after reset&quot;);
    ASSERT(alloc.available() == alloc.capacity(), &quot;All memory should be available&quot;);

    return true;
}

bool test_linear_out_of_memory() {
    LinearAllocator alloc(100);

    void* ptr1 = alloc.allocate(50);
    ASSERT(ptr1 != nullptr, &quot;First allocation should succeed&quot;);

    void* ptr2 = alloc.allocate(60);
    ASSERT(ptr2 == nullptr, &quot;Should fail when out of memory&quot;);

    return true;
}

bool test_linear_alignment() {

    void* ptr1 = alloc.allocate(1, 16);  // 16-byte alignment
    ASSERT(ptr1 != nullptr, &quot;Aligned allocation should succeed&quot;);
    ASSERT(reinterpret_cast&lt;uintptr_t&gt;(ptr1) % 16 == 0, &quot;Should be 16-byte aligned&quot;);

    return true;
}

bool test_pool_reuse() {

    ASSERT(ptr2 == original_ptr, &quot;Should reuse freed block&quot;);

bool test_stack_markers() {

    ASSERT(marker1 == 0, &quot;Initial marker should be 0&quot;);

    ASSERT(marker3 &gt; marker2, &quot;Marker should increase again&quot;);

    alloc.free_to_marker(marker2);
    ASSERT(alloc.get_marker() == marker2, &quot;Should free to marker&quot;);

    alloc.free_to_marker(marker1);
    ASSERT(alloc.used() == 0, &quot;Should free all to initial marker&quot;);

    return true;

bool test_stack_lifo() {
    StackAllocator alloc(1024);

    auto m0 = alloc.get_marker();
    void* ptr1 = alloc.allocate(100);
    auto m1 = alloc.get_marker();

    void* ptr2 = alloc.allocate(200);
    auto m2 = alloc.get_marker();

    void* ptr3 = alloc.allocate(50);
    auto m3 = alloc.get_marker();

    // Free in LIFO order

        threads.emplace_back([&amp;]() {
            for (int j = 0; j &lt; INCREMENTS; ++j) {
                MutexLock::Guard guard(mutex);
                counter++;
            }
        });
    }

    for (auto&amp; t : threads) t.join();

bool test_pointer_cas() {
    int value1 = 10;
    int value2 = 20;
    int value3 = 30;

    PointerLock&lt;int&gt; ptr(&amp;value1);

    int* expected = &amp;value1;
    ASSERT(ptr.compare_exchange_strong(expected, &amp;value2), &quot;CAS should succeed&quot;);
    ASSERT(ptr.load() == &amp;value2, &quot;Pointer should be value2&quot;);

    expected = &amp;value1;  // Wrong expected
    ASSERT(!ptr.compare_exchange_strong(expected, &amp;value3), &quot;CAS should fail&quot;);
    ASSERT(ptr.load() == &amp;value2, &quot;Pointer should still be value2&quot;);

bool test_pointer_concurrent() {

    PointerLock&lt;int&gt; ptr(nullptr);

    std::vector&lt;std::thread&gt; threads;
    for (int i = 0; i &lt; 10; ++i) {
        threads.emplace_back([&amp;, i]() {
            int* local = new int(i);
            int* expected = nullptr;
            if (ptr.compare_exchange_strong(expected, local)) {
                success_count.fetch_add(1);
            } else {
                delete local;
            }
        });
    }

    for (auto&amp; t : threads) t.join();

    ASSERT(success_count.load() == 1, &quot;Only one CAS should succeed&quot;);
    delete ptr.load();

bool test_rwlock_multiple_readers() {
    ReadWriteLock rwlock;
    std::atomic&lt;int&gt; concurrent_readers{0};
    std::atomic&lt;int&gt; max_concurrent{0};

    std::vector&lt;std::thread&gt; threads;
    for (int i = 0; i &lt; 5; ++i) {
        threads.emplace_back([&amp;]() {
            ReadWriteLock::ReadGuard guard(rwlock);
            int current = concurrent_readers.fetch_add(1) + 1;

            int expected_max = max_concurrent.load();
            while (current &gt; expected_max &amp;&amp; 
                   !max_concurrent.compare_exchange_weak(expected_max, current)) {}

            std::this_thread::sleep_for(std::chrono::milliseconds(10));
            concurrent_readers.fetch_sub(1);
        });
    }

    for (auto&amp; t : threads) t.join();

    ASSERT(max_concurrent.load() &gt; 1, &quot;Should have concurrent readers&quot;);
    return true;
}

bool test_rwlock_writer_exclusion() {
    ReadWriteLock rwlock;
    int shared_value = 0;
    std::atomic&lt;bool&gt; writer_active{false};

    std::vector&lt;std::thread&gt; threads;

    // Writer
    threads.emplace_back([&amp;]() {
        ReadWriteLock::WriteGuard guard(rwlock);
        writer_active.store(true);
        shared_value = 42;
        std::this_thread::sleep_for(std::chrono::milliseconds(50));
        writer_active.store(false);
    });

    // Readers
    for (int i = 0; i &lt; 3; ++i) {
        threads.emplace_back([&amp;]() {
            std::this_thread::sleep_for(std::chrono::milliseconds(10));
            ReadWriteLock::ReadGuard guard(rwlock);
            ASSERT(!writer_active.load(), &quot;No writer should be active during read&quot;);
            int val = shared_value;
            (void)val;
        });
    }

    for (auto&amp; t : threads) t.join();

    ASSERT(shared_value == 42, &quot;Value should be 42&quot;);
    return true;
}

bool test_rwlock_try_locks() {

    ASSERT(rwlock.try_lock_read(), &quot;Second try_lock_read should succeed&quot;);
    ASSERT(!rwlock.try_lock_write(), &quot;try_lock_write should fail with readers&quot;);

    rwlock.unlock_read();
    rwlock.unlock_read();

    ASSERT(rwlock.try_lock_write(), &quot;try_lock_write should succeed&quot;);
    ASSERT(!rwlock.try_lock_read(), &quot;try_lock_read should fail with writer&quot;);

}

<pre><code class="language-cpp">/**
 * @file shared_ptr_test.cpp
 * @brief Comprehensive test suite for shared_ptr implementation
 * 
 * This file contains unit tests to verify correctness of the shared_ptr implementation.
 * Compile with: g++ -std=c++14 -Wall -Wextra -g -I. tests/shared_ptr_test.cpp -o build/shared_ptr_test
 * Run with: ./build/shared_ptr_test
 */

#include &quot;shared_ptr/shared_ptr.hpp&quot;
#include &lt;iostream&gt;
#include &lt;cassert&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

// Test counter to track object creation/destruction
static int g_object_count = 0;

// Test class that tracks construction/destruction
class TestObject {
private:
    int value_;
    std::string name_;

public:
    TestObject(int value = 0, const std::string&amp; name = &quot;default&quot;) 
        : value_(value), name_(name) {
        g_object_count++;
    }

    ~TestObject() {
        g_object_count--;
    }

    int getValue() const { return value_; }
    std::string getName() const { return name_; }
    void setValue(int v) { value_ = v; }
};

// Base class for polymorphism tests
class Base {
public:
    virtual ~Base() = default;
    virtual int getType() const { return 0; }
};

class Derived : public Base {
public:
    int getType() const override { return 1; }
};

// Test helper macros
#define TEST(name) \\
    void test_##name(); \\
    struct TestRegistrar_##name { \\
        TestRegistrar_##name() { \\
            std::cout &lt;&lt; &quot;Running test: &quot; #name &quot;...&quot;; \\
            test_##name(); \\
            std::cout &lt;&lt; &quot; PASSED\\n&quot;; \\
        } \\
    } registrar_##name; \\
    void test_##name()

#define ASSERT_TRUE(cond) \\
    do { if (!(cond)) { \\
        std::cerr &lt;&lt; &quot;\\n  Assertion failed at line &quot; &lt;&lt; __LINE__ &lt;&lt; &quot;: &quot; #cond &quot;\\n&quot;; \\
        std::abort(); \\
    } } while(0)

#define ASSERT_FALSE(cond) ASSERT_TRUE(!(cond))
#define ASSERT_EQ(a, b) ASSERT_TRUE((a) == (b))
#define ASSERT_NE(a, b) ASSERT_TRUE((a) != (b))

// ============================================================================
// CONSTRUCTION TESTS
// ============================================================================

TEST(default_construction) {
    SharedPtr&lt;TestObject&gt; ptr;
    ASSERT_TRUE(ptr.get() == nullptr);
    ASSERT_FALSE(ptr);
    ASSERT_EQ(ptr.use_count(), 0);
}

TEST(nullptr_construction) {
    SharedPtr&lt;TestObject&gt; ptr(nullptr);
    ASSERT_TRUE(ptr.get() == nullptr);
    ASSERT_FALSE(ptr);
    ASSERT_EQ(ptr.use_count(), 0);
}

TEST(pointer_construction) {
    int initial_count = g_object_count;
    {
        SharedPtr&lt;TestObject&gt; ptr(new TestObject(42, &quot;test&quot;));
        ASSERT_TRUE(ptr.get() != nullptr);

    test(&quot;Completed tasks counter&quot;, pool.completed_tasks() &gt;= 100);
}

// Test 5: Execute (Fire and Forget)
void test_execute() {
    ThreadPool pool(2);
    std::atomic&lt;int&gt; counter{0};

    for (int i = 0; i &lt; 50; ++i) {
        pool.execute([&amp;counter]() {
            counter.fetch_add(1, std::memory_order_relaxed);
        });
    }

    pool.wait();

    test(&quot;Execute fire-and-forget&quot;, counter.load() == 50);
}

// Test 6: Wait for Completion
void test_wait() {
    ThreadPool pool(4);
    std::atomic&lt;int&gt; counter{0};

    for (int i = 0; i &lt; 100; ++i) {
        pool.execute([&amp;counter]() {
            std::this_thread::sleep_for(std::chrono::milliseconds(1));
            counter.fetch_add(1, std::memory_order_relaxed);
        });
    }

    pool.wait();

    test(&quot;Wait completes all tasks&quot;, counter.load() == 100);
    test(&quot;No queued tasks after wait&quot;, pool.queued_tasks() == 0);
    test(&quot;No active workers after wait&quot;, pool.active_workers() == 0);
}

// Test 7: Parallel Computation
void test_parallel_computation() {
    ThreadPool pool(4);

    const int N = 10000;
    std::vector&lt;int&gt; numbers(N);
    std::iota(numbers.begin(), numbers.end(), 1);

    size_t chunk_size = N / pool.num_workers();
    std::vector&lt;std::future&lt;long long&gt;&gt; futures;

    for (size_t i = 0; i &lt; pool.num_workers(); ++i) {
        size_t start = i * chunk_size;
        size_t end = (i == pool.num_workers() - 1) ? N : (i + 1) * chunk_size;

        futures.push_back(pool.submit([&amp;numbers, start, end]() {
            long long sum = 0;
            for (size_t j = start; j &lt; end; ++j) {
                sum += numbers[j];
            }
            return sum;
        }));
    }

    long long total = 0;
    for (auto&amp; future : futures) {
        total += future.get();
    }

    long long expected = (long long)N * (N + 1) / 2;
    test(&quot;Parallel computation correct&quot;, total == expected);
}

// Test 8: Parallel For
void test_parallel_for() {
    ThreadPool pool(4);
    ParallelFor pfor(pool);

    std::vector&lt;int&gt; data(1000);

    pfor.execute(0, data.size(), [&amp;data](size_t i) {
        data[i] = i * i;
    });

    bool all_correct = true;
    for (size_t i = 0; i &lt; data.size(); ++i) {
        if (data[i] != (int)(i * i)) {
            all_correct = false;
            break;
        }
    }

    test(&quot;Parallel for executes correctly&quot;, all_correct);
}

// Test 9: Exception Handling
void test_exception_handling() {
    ThreadPool pool(2);

    // Submit task that throws
    auto future = pool.submit([]() -&gt; int {
        throw std::runtime_error(&quot;Test exception&quot;);
        return 0;
    });

    bool exception_caught = false;
    try {
        future.get();
    } catch (const std::runtime_error&amp; e) {
        exception_caught = true;
    }

    test(&quot;Exception propagated through future&quot;, exception_caught);

    // Pool should still work after exception
    auto future2 = pool.submit([]() { return 100; });
    test(&quot;Pool still works after exception&quot;, future2.get() == 100);
}

// Test 10: Task Queue Statistics
void test_statistics() {
    ThreadPool pool(1);  // Single worker

    // Submit slow tasks
    for (int i = 0; i &lt; 10; ++i) {
        pool.execute([]() {
            std::this_thread::sleep_for(std::chrono::milliseconds(10));
        });
    }

    std::this_thread::sleep_for(std::chrono::milliseconds(5));

    test(&quot;Queued tasks tracked&quot;, pool.queued_tasks() &gt; 0 || pool.active_workers() &gt; 0);

    pool.wait();
    test(&quot;Completed tasks incremented&quot;, pool.completed_tasks() &gt;= 10);
}

// Test 11: Shutdown
void test_shutdown() {
    ThreadPool pool(4);

    for (int i = 0; i &lt; 50; ++i) {
        pool.execute([]() {
            std::this_thread::sleep_for(std::chrono::milliseconds(1));
        });
    }

    pool.shutdown();

    test(&quot;Pool stopped after shutdown&quot;, pool.is_stopped());
    test(&quot;No workers after shutdown&quot;, pool.num_workers() == 0);

    // Submitting after shutdown should throw
    bool throws_exception = false;
    try {
        pool.submit([]() { return 1; });
    } catch (const std::runtime_error&amp;) {
        throws_exception = true;
    }

    test(&quot;Submit throws after shutdown&quot;, throws_exception);
}

// Test 12: Hardware Concurrency Default
void test_default_construction() {
    ThreadPool pool;
    test(&quot;Default uses hardware concurrency&quot;, 
         pool.num_workers() == std::thread::hardware_concurrency());
}

// Test 13: Concurrent Task Submission
void test_concurrent_submission() {
    ThreadPool pool(4);
    std::atomic&lt;int&gt; submitted{0};
    std::atomic&lt;int&gt; executed{0};

    std::vector&lt;std::thread&gt; submitters;
    for (int i = 0; i &lt; 4; ++i) {
        submitters.emplace_back([&amp;]() {
            for (int j = 0; j &lt; 25; ++j) {
                pool.execute([&amp;executed]() {
                    executed.fetch_add(1, std::memory_order_relaxed);
                });
                submitted.fetch_add(1, std::memory_order_relaxed);
            }
        });
    }

    for (auto&amp; t : submitters) t.join();
    pool.wait();

    test(&quot;Concurrent submission all tasks submitted&quot;, submitted.load() == 100);
    test(&quot;Concurrent submission all tasks executed&quot;, executed.load() == 100);
}

// Test 14: Task Queue (Priority)
void test_task_queue() {
    TaskQueue&lt;int&gt; queue;

    queue.push(10, 1);
    queue.push(20, 3);
    queue.push(30, 2);

    int value;
    queue.pop(value);
    test(&quot;Task queue highest priority first&quot;, value == 20);

    queue.pop(value);
    test(&quot;Task queue second priority&quot;, value == 30);

    queue.pop(value);
    test(&quot;Task queue lowest priority&quot;, value == 10);
}

// Test 15: Work Stealing Thread Pool
void test_work_stealing() {
    WorkStealingThreadPool pool(4);
    std::atomic&lt;int&gt; counter{0};

    for (int i = 0; i &lt; 100; ++i) {
        pool.submit([&amp;counter]() {
            counter.fetch_add(1, std::memory_order_relaxed);
        });
    }

    std::this_thread::sleep_for(std::chrono::milliseconds(100));

    test(&quot;Work stealing pool executes tasks&quot;, counter.load() == 100);
    test(&quot;Work stealing pool has workers&quot;, pool.num_workers() == 4);
}

    std::cout &lt;&lt; &quot;║          Thread Pool Test Suite               ║\\n&quot;;

    test_submit_with_return();
    test_submit_with_params();
    test_multiple_tasks();
    test_execute();
    test_wait();
    test_parallel_computation();
    test_parallel_for();
    test_exception_handling();
    test_statistics();
    test_shutdown();
    test_default_construction();
    test_concurrent_submission();
    test_task_queue();
    test_work_stealing();

    std::cout &lt;&lt; &quot;Tests passed: &quot; &lt;&lt; g_tests_passed &lt;&lt; &quot;\\n&quot;;

<pre><code class="language-cpp">/**
 * @file test_suite.cpp
 * @brief Comprehensive test suite for unique_ptr implementation
 * 
 * This file contains unit tests to verify correctness of the unique_ptr implementation.
 * Compile with: g++ -std=c++14 -Wall -Wextra -g test_suite.cpp -o test_suite
 * Run with: ./test_suite
 */

#include &quot;unique_ptr/unique_ptr.hpp&quot;
#include &lt;iostream&gt;
#include &lt;cassert&gt;
#include &lt;string&gt;

// Test counter to track object creation/destruction
static int g_object_count = 0;

// Test class that tracks construction/destruction
class TestObject {
private:
    int value_;
    std::string name_;

public:
    TestObject(int value = 0, const std::string&amp; name = &quot;default&quot;) 
        : value_(value), name_(name) {
        g_object_count++;
    }

    ~TestObject() {
        g_object_count--;
    }

    int getValue() const { return value_; }
    std::string getName() const { return name_; }
    void setValue(int v) { value_ = v; }
};

// Base class for polymorphism tests
class Base {
public:
    virtual ~Base() = default;
    virtual int getType() const { return 0; }
};

class Derived : public Base {
public:
    int getType() const override { return 1; }
};

// Custom deleter for testing
static int g_custom_deleter_calls = 0;

template&lt;typename T&gt;
struct CountingDeleter {
    void operator()(T* ptr) const {
        g_custom_deleter_calls++;
        delete ptr;
    }
};

// Test helper macros
#define TEST(name) \\
    void test_##name(); \\
    struct TestRegistrar_##name { \\
        TestRegistrar_##name() { \\
            std::cout &lt;&lt; &quot;Running test: &quot; #name &quot;...&quot;; \\
            test_##name(); \\
            std::cout &lt;&lt; &quot; PASSED\\n&quot;; \\
        } \\
    } registrar_##name; \\
    void test_##name()

#define ASSERT_TRUE(cond) \\
    do { if (!(cond)) { \\
        std::cerr &lt;&lt; &quot;\\n  Assertion failed at line &quot; &lt;&lt; __LINE__ &lt;&lt; &quot;: &quot; #cond &quot;\\n&quot;; \\
        std::abort(); \\
    } } while(0)

#define ASSERT_FALSE(cond) ASSERT_TRUE(!(cond))
#define ASSERT_EQ(a, b) ASSERT_TRUE((a) == (b))
#define ASSERT_NE(a, b) ASSERT_TRUE((a) != (b))

// ============================================================================
// CONSTRUCTION TESTS
// ============================================================================

TEST(default_construction) {
    UniquePtr&lt;TestObject&gt; ptr;
    ASSERT_TRUE(ptr.get() == nullptr);
    ASSERT_FALSE(ptr);
}

TEST(nullptr_construction) {
    UniquePtr&lt;TestObject&gt; ptr(nullptr);
    ASSERT_TRUE(ptr.get() == nullptr);
    ASSERT_FALSE(ptr);
}

TEST(pointer_construction) {
    int initial_count = g_object_count;
    {
        UniquePtr&lt;TestObject&gt; ptr(new TestObject(42, &quot;test&quot;));
        ASSERT_TRUE(ptr.get() != nullptr);
        ASSERT_TRUE(ptr);
        ASSERT_EQ(ptr-&gt;getValue(), 42);
        ASSERT_EQ(g_object_count, initial_count + 1);
    }
    ASSERT_EQ(g_object_count, initial_count);
}

TEST(make_unique) {
    int initial_count = g_object_count;
    {
        auto ptr = makeUnique&lt;TestObject&gt;(100, &quot;made&quot;);
        ASSERT_TRUE(ptr);
        ASSERT_EQ(ptr-&gt;getValue(), 100);
        ASSERT_EQ(ptr-&gt;getName(), &quot;made&quot;);
        ASSERT_EQ(g_object_count, initial_count + 1);
    }
    ASSERT_EQ(g_object_count, initial_count);
}

TEST(move_construction) {
    auto ptr1 = makeUnique&lt;TestObject&gt;(50, &quot;move_test&quot;);
    TestObject* raw = ptr1.get();

    UniquePtr&lt;TestObject&gt; ptr2(std::move(ptr1));

    ASSERT_FALSE(ptr1);
    ASSERT_TRUE(ptr2);
    ASSERT_EQ(ptr2.get(), raw);
    ASSERT_EQ(ptr2-&gt;getValue(), 50);
}

// ============================================================================
// ASSIGNMENT TESTS
// ============================================================================

TEST(move_assignment) {
    auto ptr1 = makeUnique&lt;TestObject&gt;(10, &quot;first&quot;);
    auto ptr2 = makeUnique&lt;TestObject&gt;(20, &quot;second&quot;);

    TestObject* raw1 = ptr1.get();
    int count_before = g_object_count;

    ptr2 = std::move(ptr1);

    ASSERT_FALSE(ptr1);
    ASSERT_TRUE(ptr2);
    ASSERT_EQ(ptr2.get(), raw1);
    ASSERT_EQ(ptr2-&gt;getValue(), 10);
    ASSERT_EQ(g_object_count, count_before - 1); // ptr2's original object deleted
}

TEST(nullptr_assignment) {
    auto ptr = makeUnique&lt;TestObject&gt;(30);
    int count_before = g_object_count;

    ptr = nullptr;

    ASSERT_FALSE(ptr);
    ASSERT_EQ(g_object_count, count_before - 1);
}

TEST(self_move_assignment) {
    auto ptr = makeUnique&lt;TestObject&gt;(40);
    TestObject* raw = ptr.get();

    ptr = std::move(ptr);  // Self-assignment

    // Object should still be valid
    ASSERT_TRUE(ptr);
    ASSERT_EQ(ptr.get(), raw);
}

// ============================================================================
// MODIFIER TESTS
// ============================================================================

TEST(reset_empty) {
    auto ptr = makeUnique&lt;TestObject&gt;(50);
    int count_before = g_object_count;

    ptr.reset();

    ASSERT_FALSE(ptr);
    ASSERT_EQ(g_object_count, count_before - 1);
}

TEST(reset_with_pointer) {
    auto ptr = makeUnique&lt;TestObject&gt;(60);
    int count_before = g_object_count;
    TestObject* new_obj = new TestObject(70);
    int count_after_new = g_object_count;

    ptr.reset(new_obj);

    ASSERT_TRUE(ptr);
    ASSERT_EQ(ptr.get(), new_obj);
    ASSERT_EQ(ptr-&gt;getValue(), 70);
    ASSERT_EQ(g_object_count, count_before); // Old deleted, new was already added
    ASSERT_EQ(g_object_count, count_after_new - 1); // Verify old was deleted
}

TEST(release) {
    auto ptr = makeUnique&lt;TestObject&gt;(80);
    int count_before = g_object_count;
    TestObject* raw = ptr.get();

    TestObject* released = ptr.release();

    ASSERT_FALSE(ptr);
    ASSERT_EQ(released, raw);
    ASSERT_EQ(g_object_count, count_before); // Object not deleted

    delete released; // Manual cleanup
    ASSERT_EQ(g_object_count, count_before - 1);
}

TEST(swap) {
    auto ptr1 = makeUnique&lt;TestObject&gt;(90);
    auto ptr2 = makeUnique&lt;TestObject&gt;(95);

    TestObject* raw1 = ptr1.get();
    TestObject* raw2 = ptr2.get();

    ptr1.swap(ptr2);

    ASSERT_EQ(ptr1.get(), raw2);
    ASSERT_EQ(ptr2.get(), raw1);
    ASSERT_EQ(ptr1-&gt;getValue(), 95);
    ASSERT_EQ(ptr2-&gt;getValue(), 90);
}

// ============================================================================
// OBSERVER TESTS
// ============================================================================

TEST(get) {
    TestObject* raw = new TestObject(100);
    UniquePtr&lt;TestObject&gt; ptr(raw);

    ASSERT_EQ(ptr.get(), raw);
}

TEST(dereference_operator) {
    auto ptr = makeUnique&lt;TestObject&gt;(110);

    TestObject&amp; ref = *ptr;
    ASSERT_EQ(ref.getValue(), 110);

    ref.setValue(120);
    ASSERT_EQ(ptr-&gt;getValue(), 120);
}

TEST(arrow_operator) {
    auto ptr = makeUnique&lt;TestObject&gt;(130);

    ASSERT_EQ(ptr-&gt;getValue(), 130);
    ptr-&gt;setValue(140);
    ASSERT_EQ(ptr-&gt;getValue(), 140);
}

TEST(bool_conversion) {
    UniquePtr&lt;TestObject&gt; empty;
    auto full = makeUnique&lt;TestObject&gt;();

    ASSERT_FALSE(static_cast&lt;bool&gt;(empty));
    ASSERT_TRUE(static_cast&lt;bool&gt;(full));

    if (full) {
        // Should execute
    } else {
        ASSERT_TRUE(false); // Should not reach
    }
}

// ============================================================================
// ARRAY TESTS
// ============================================================================

TEST(array_construction) {
    int initial_count = g_object_count;
    {
        UniquePtr&lt;TestObject[]&gt; arr(new TestObject[3]);
        ASSERT_TRUE(arr);
        ASSERT_EQ(g_object_count, initial_count + 3);
    }
    ASSERT_EQ(g_object_count, initial_count);
}

TEST(make_unique_array) {
    auto arr = makeUniqueArray&lt;int&gt;(5);
    ASSERT_TRUE(arr);

    for (int i = 0; i &lt; 5; ++i) {
        arr[i] = i * 10;
    }

    for (int i = 0; i &lt; 5; ++i) {
        ASSERT_EQ(arr[i], i * 10);
    }
}

TEST(array_subscript) {
    UniquePtr&lt;int[]&gt; arr(new int[3]{10, 20, 30});

    ASSERT_EQ(arr[0], 10);
    ASSERT_EQ(arr[1], 20);
    ASSERT_EQ(arr[2], 30);

    arr[1] = 25;
    ASSERT_EQ(arr[1], 25);
}

// ============================================================================
// CUSTOM DELETER TESTS
// ============================================================================

TEST(custom_deleter) {
    g_custom_deleter_calls = 0;
    {
        UniquePtr&lt;TestObject, CountingDeleter&lt;TestObject&gt;&gt; ptr(
            new TestObject(),
            CountingDeleter&lt;TestObject&gt;()
        );
        ASSERT_TRUE(ptr);
    }
    ASSERT_EQ(g_custom_deleter_calls, 1);
}

// ============================================================================
// POLYMORPHISM TESTS
// ============================================================================

TEST(polymorphic_deletion) {
    UniquePtr&lt;Base&gt; ptr = makeUnique&lt;Derived&gt;();
    ASSERT_EQ(ptr-&gt;getType(), 1); // Derived type
}

TEST(derived_to_base_conversion) {
    UniquePtr&lt;Derived&gt; derived = makeUnique&lt;Derived&gt;();
    ASSERT_EQ(derived-&gt;getType(), 1);

    UniquePtr&lt;Base&gt; base = std::move(derived);
    ASSERT_FALSE(derived);
    ASSERT_TRUE(base);
    ASSERT_EQ(base-&gt;getType(), 1);
}

// ============================================================================
// COMPARISON TESTS
// ============================================================================

TEST(nullptr_comparison) {
    UniquePtr&lt;TestObject&gt; empty;
    auto full = makeUnique&lt;TestObject&gt;();

    ASSERT_TRUE(empty == nullptr);
    ASSERT_TRUE(nullptr == empty);
    ASSERT_FALSE(full == nullptr);
    ASSERT_FALSE(nullptr == full);

    ASSERT_FALSE(empty != nullptr);
    ASSERT_TRUE(full != nullptr);
}

TEST(pointer_comparison) {
    auto ptr1 = makeUnique&lt;TestObject&gt;();
    auto ptr2 = makeUnique&lt;TestObject&gt;();
    UniquePtr&lt;TestObject&gt; empty;

    ASSERT_TRUE(ptr1 != ptr2);
    ASSERT_FALSE(ptr1 == ptr2);
    ASSERT_TRUE(empty == empty);
}

// ============================================================================
// FUNCTION PARAMETER TESTS
// ============================================================================

void take_ownership(UniquePtr&lt;TestObject&gt; ptr) {
    ASSERT_TRUE(ptr);
    // ptr deleted when function returns
}

void borrow_pointer(const UniquePtr&lt;TestObject&gt;&amp; ptr) {
    ASSERT_TRUE(ptr);
}

void modify_pointer(UniquePtr&lt;TestObject&gt;&amp; ptr) {
    ptr.reset(new TestObject(999));
}

TEST(function_by_value) {
    auto ptr = makeUnique&lt;TestObject&gt;(200);
    int count_before = g_object_count;

    take_ownership(std::move(ptr));

    ASSERT_FALSE(ptr);
    ASSERT_EQ(g_object_count, count_before - 1);
}

TEST(function_by_reference) {
    auto ptr = makeUnique&lt;TestObject&gt;(210);

    borrow_pointer(ptr);

    ASSERT_TRUE(ptr);
    ASSERT_EQ(ptr-&gt;getValue(), 210);
}

TEST(function_modify) {
    auto ptr = makeUnique&lt;TestObject&gt;(220);

    modify_pointer(ptr);

    ASSERT_TRUE(ptr);
    ASSERT_EQ(ptr-&gt;getValue(), 999);
}

// ============================================================================
// RETURN VALUE TESTS
// ============================================================================

UniquePtr&lt;TestObject&gt; return_by_value(int value) {
    return makeUnique&lt;TestObject&gt;(value);
}

TEST(function_return) {
    auto ptr = return_by_value(300);

    ASSERT_TRUE(ptr);
    ASSERT_EQ(ptr-&gt;getValue(), 300);
}

// ============================================================================
// EDGE CASE TESTS
// ============================================================================

TEST(multiple_reset) {
    auto ptr = makeUnique&lt;TestObject&gt;(400);

    ptr.reset(new TestObject(401));
    ptr.reset(new TestObject(402));
    ptr.reset(new TestObject(403));

    ASSERT_EQ(ptr-&gt;getValue(), 403);
}

TEST(reset_with_get) {
    auto ptr = makeUnique&lt;TestObject&gt;(500);
    // Note: Resetting with the same pointer causes undefined behavior
    // This test is commented out as it's an anti-pattern
    // In real code, never do: ptr.reset(ptr.get());
    ASSERT_TRUE(ptr);
    ASSERT_EQ(ptr-&gt;getValue(), 500);
}

TEST(move_from_empty) {
    UniquePtr&lt;TestObject&gt; empty1;
    UniquePtr&lt;TestObject&gt; empty2(std::move(empty1));

    ASSERT_FALSE(empty1);
    ASSERT_FALSE(empty2);
}
