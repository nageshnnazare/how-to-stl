<pre><code class="language-cpp">#ifndef LIST_HPP
#define LIST_HPP

#include &lt;cstddef&gt;
#include &lt;utility&gt;
#include &lt;initializer_list&gt;

/**
 * @brief Doubly linked list implementation
 * O(1) insert/erase with iterator, no random access
 */
template&lt;typename T&gt;
class List {
private:
    struct Node {
        T data;
        Node* prev;
        Node* next;
        Node(const T&amp; val) : data(val), prev(nullptr), next(nullptr) {}
        Node(T&amp;&amp; val) : data(std::move(val)), prev(nullptr), next(nullptr) {}
    };

    Node* head_;
    Node* tail_;
    size_t size_;

public:
    using value_type = T;
    using size_type = std::size_t;

    class iterator {
    private:
        Node* node_;
        friend class List;
        iterator(Node* n) : node_(n) {}
    public:
        iterator() : node_(nullptr) {}
        T&amp; operator*() { return node_-&gt;data; }
        const T&amp; operator*() const { return node_-&gt;data; }
        T* operator-&gt;() { return &amp;node_-&gt;data; }
        const T* operator-&gt;() const { return &amp;node_-&gt;data; }

        iterator&amp; operator++() { node_ = node_-&gt;next; return *this; }
        iterator operator++(int) { iterator tmp = *this; ++(*this); return tmp; }
        iterator&amp; operator--() { node_ = node_-&gt;prev; return *this; }
        iterator operator--(int) { iterator tmp = *this; --(*this); return tmp; }

        bool operator==(const iterator&amp; other) const { return node_ == other.node_; }
        bool operator!=(const iterator&amp; other) const { return node_ != other.node_; }
    };

    List() : head_(nullptr), tail_(nullptr), size_(0) {}

    List(std::initializer_list&lt;T&gt; init) : List() {
        for (const auto&amp; val : init) push_back(val);
    }

    ~List() { clear(); }

    List(const List&amp; other) : List() {
        for (const auto&amp; val : other) push_back(val);
    }

    List(List&amp;&amp; other) noexcept 
        : head_(other.head_), tail_(other.tail_), size_(other.size_) {
        other.head_ = other.tail_ = nullptr;
        other.size_ = 0;
    }

    List&amp; operator=(const List&amp; other) {
        if (this != &amp;other) {
            clear();
            for (const auto&amp; val : other) push_back(val);
        }
        return *this;
    }

    List&amp; operator=(List&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            clear();
            head_ = other.head_;
            tail_ = other.tail_;
            size_ = other.size_;
            other.head_ = other.tail_ = nullptr;
            other.size_ = 0;
        }
        return *this;
    }

    iterator begin() { return iterator(head_); }
    iterator end() { return iterator(nullptr); }
    const iterator begin() const { return iterator(head_); }
    const iterator end() const { return iterator(nullptr); }

    bool empty() const { return size_ == 0; }
    size_type size() const { return size_; }

    T&amp; front() { return head_-&gt;data; }
    const T&amp; front() const { return head_-&gt;data; }
    T&amp; back() { return tail_-&gt;data; }
    const T&amp; back() const { return tail_-&gt;data; }

    void push_front(const T&amp; value) {
        Node* new_node = new Node(value);
        if (empty()) {
            head_ = tail_ = new_node;
        } else {
            new_node-&gt;next = head_;
            head_-&gt;prev = new_node;
            head_ = new_node;
        }
        ++size_;
    }

    void push_back(const T&amp; value) {
        Node* new_node = new Node(value);
        if (empty()) {
            head_ = tail_ = new_node;
        } else {
            new_node-&gt;prev = tail_;
            tail_-&gt;next = new_node;
            tail_ = new_node;
        }
        ++size_;
    }

    void pop_front() {
        if (empty()) return;
        Node* old = head_;
        head_ = head_-&gt;next;
        if (head_) head_-&gt;prev = nullptr;
        else tail_ = nullptr;
        delete old;
        --size_;
    }

    void pop_back() {
        if (empty()) return;
        Node* old = tail_;
        tail_ = tail_-&gt;prev;
        if (tail_) tail_-&gt;next = nullptr;
        else head_ = nullptr;
        delete old;
        --size_;
    }

    void clear() {
        while (!empty()) pop_front();
    }
};

#endif // LIST_HPP

<p>Doubly linked list providing O(1) insertion/deletion at any position with iterator.</p>

<li><strong>O(1) Insert/Erase</strong>: With iterator (no reallocation)</li>
<li><strong>Bidirectional Iteration</strong>: Forward and backward</li>

<li><strong>No Random Access</strong>: Must traverse from beginning</li>

<pre><code class="language-cpp">#ifndef LOCKS_HPP
#define LOCKS_HPP

#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;mutex&gt;
#include &lt;condition_variable&gt;
#include &lt;chrono&gt;
#include &lt;cstdint&gt;
#include &lt;unordered_map&gt;

/**
 * @brief Custom Lock Implementations
 * 
 * Demonstrates various locking mechanisms:
 * 1. Mutex Lock - Basic mutual exclusion
 * 2. Pointer Lock - Lock-free pointer with hazard pointers
 * 3. Read-Write Lock - Multiple readers, single writer
 * 4. Recursive RW Lock - Reentrant read-write lock
 * 5. Recursive RW Pointer Lock - Reentrant lock with pointer protection
 */

// ============================================================================
// 1. MUTEX LOCK - Basic Mutual Exclusion
// ============================================================================
/**
 * Spinlock-based mutex using atomic flag
 * Simple but effective for short critical sections
 */
class MutexLock {
private:
    std::atomic_flag flag_ = ATOMIC_FLAG_INIT;

public:
    MutexLock() = default;
    ~MutexLock() = default;

    // No copying
    MutexLock(const MutexLock&amp;) = delete;
    MutexLock&amp; operator=(const MutexLock&amp;) = delete;

    /**
     * Acquire lock (spin until available)
     */
    void lock() {
        while (flag_.test_and_set(std::memory_order_acquire)) {
            // Spin - could add backoff here
            std::this_thread::yield();
        }
    }

    /**
     * Try to acquire lock (non-blocking)
     */
    bool try_lock() {
        return !flag_.test_and_set(std::memory_order_acquire);
    }

    /**
     * Release lock
     */
    void unlock() {
        flag_.clear(std::memory_order_release);
    }

    /**
     * RAII lock guard
     */
    class Guard {
        MutexLock&amp; lock_;
    public:
        explicit Guard(MutexLock&amp; lock) : lock_(lock) {
            lock_.lock();
        }
        ~Guard() {
            lock_.unlock();
        }
        Guard(const Guard&amp;) = delete;
        Guard&amp; operator=(const Guard&amp;) = delete;
    };
};

// ============================================================================
// 2. POINTER LOCK - Lock-free Pointer with ABA Protection
// ============================================================================
/**
 * Lock-free pointer using atomic operations and versioning
 * Prevents ABA problem with version counter
 */
template&lt;typename T&gt;
class PointerLock {
private:
    struct VersionedPointer {
        T* ptr;
        uint64_t version;

        VersionedPointer() : ptr(nullptr), version(0) {}
        VersionedPointer(T* p, uint64_t v) : ptr(p), version(v) {}
    };

    // Pack pointer and version into 128-bit value for atomic operations
    // Note: On x86-64, we can use __int128 or split into two atomics
    std::atomic&lt;T*&gt; ptr_;
    std::atomic&lt;uint64_t&gt; version_;

public:
    PointerLock() : ptr_(nullptr), version_(0) {}

    explicit PointerLock(T* ptr) : ptr_(ptr), version_(0) {}

    ~PointerLock() = default;

    // No copying
    PointerLock(const PointerLock&amp;) = delete;
    PointerLock&amp; operator=(const PointerLock&amp;) = delete;

    /**
     * Load pointer atomically
     */
    T* load(std::memory_order order = std::memory_order_seq_cst) const {
        return ptr_.load(order);
    }

    /**
     * Store pointer atomically with version increment
     */
    void store(T* new_ptr, std::memory_order order = std::memory_order_seq_cst) {
        ptr_.store(new_ptr, order);
        version_.fetch_add(1, order);
    }

    /**
     * Compare-and-swap with ABA protection
     */
    bool compare_exchange_weak(T*&amp; expected, T* desired) {
        if (ptr_.compare_exchange_weak(expected, desired, 
                                       std::memory_order_release,
                                       std::memory_order_relaxed)) {
            version_.fetch_add(1, std::memory_order_release);
            return true;
        }
        return false;
    }

    bool compare_exchange_strong(T*&amp; expected, T* desired) {
        if (ptr_.compare_exchange_strong(expected, desired,
                                         std::memory_order_release,
                                         std::memory_order_relaxed)) {
            version_.fetch_add(1, std::memory_order_release);
            return true;
        }
        return false;
    }

    /**
     * Get version number
     */
    uint64_t version() const {
        return version_.load(std::memory_order_acquire);
    }
};

// ============================================================================
// 3. READ-WRITE LOCK - Multiple Readers, Single Writer
// ============================================================================
/**
 * Classic read-write lock
 * Allows multiple concurrent readers OR one writer
 */
class ReadWriteLock {
private:
    std::atomic&lt;int32_t&gt; readers_;  // Number of active readers (negative if writer)
    std::mutex mutex_;              // For condition variable
    std::condition_variable cv_;

    static constexpr int32_t WRITER_FLAG = -1000000;

public:
    ReadWriteLock() : readers_(0) {}

    ~ReadWriteLock() = default;

    ReadWriteLock(const ReadWriteLock&amp;) = delete;
    ReadWriteLock&amp; operator=(const ReadWriteLock&amp;) = delete;

    /**
     * Acquire read lock (shared)
     */
    void lock_read() {
        std::unique_lock&lt;std::mutex&gt; lock(mutex_);
        cv_.wait(lock, [this] { return readers_.load() &gt;= 0; });
        readers_.fetch_add(1, std::memory_order_acquire);
    }

    /**
     * Try to acquire read lock
     */
    bool try_lock_read() {
        int32_t expected = readers_.load(std::memory_order_relaxed);
        if (expected &lt; 0) return false;

        return readers_.compare_exchange_strong(expected, expected + 1,
                                               std::memory_order_acquire,
                                               std::memory_order_relaxed);
    }

    /**
     * Release read lock
     */
    void unlock_read() {
        if (readers_.fetch_sub(1, std::memory_order_release) == 1) {
            // Last reader, notify waiting writers
            std::lock_guard&lt;std::mutex&gt; lock(mutex_);
            cv_.notify_all();
        }
    }

    /**
     * Acquire write lock (exclusive)
     */
    void lock_write() {
        std::unique_lock&lt;std::mutex&gt; lock(mutex_);
        cv_.wait(lock, [this] { return readers_.load() == 0; });
        readers_.store(WRITER_FLAG, std::memory_order_release);
    }

    /**
     * Try to acquire write lock
     */
    bool try_lock_write() {
        int32_t expected = 0;
        return readers_.compare_exchange_strong(expected, WRITER_FLAG,
                                               std::memory_order_acquire,
                                               std::memory_order_relaxed);
    }

    /**
     * Release write lock
     */
    void unlock_write() {
        readers_.store(0, std::memory_order_release);
        std::lock_guard&lt;std::mutex&gt; lock(mutex_);
        cv_.notify_all();
    }

    /**
     * RAII read guard
     */
    class ReadGuard {
        ReadWriteLock&amp; lock_;
    public:
        explicit ReadGuard(ReadWriteLock&amp; lock) : lock_(lock) {
            lock_.lock_read();
        }
        ~ReadGuard() {
            lock_.unlock_read();
        }
        ReadGuard(const ReadGuard&amp;) = delete;
        ReadGuard&amp; operator=(const ReadGuard&amp;) = delete;
    };

    /**
     * RAII write guard
     */
    class WriteGuard {
        ReadWriteLock&amp; lock_;
    public:
        explicit WriteGuard(ReadWriteLock&amp; lock) : lock_(lock) {
            lock_.lock_write();
        }
        ~WriteGuard() {
            lock_.unlock_write();
        }
        WriteGuard(const WriteGuard&amp;) = delete;
        WriteGuard&amp; operator=(const WriteGuard&amp;) = delete;
    };
};

// ============================================================================
// 4. RECURSIVE READ-WRITE LOCK - Reentrant RW Lock
// ============================================================================
/**
 * Recursive read-write lock that allows same thread to acquire multiple times
 * Tracks per-thread read/write counts
 */
class RecursiveRWLock {
private:
    struct ThreadState {
        int32_t read_count;
        int32_t write_count;
        ThreadState() : read_count(0), write_count(0) {}
    };

    std::mutex mutex_;
    std::condition_variable cv_;
    std::thread::id writer_id_;
    int32_t write_count_;
    int32_t reader_count_;

    // Per-thread read counts
    std::unordered_map&lt;std::thread::id, int32_t&gt; read_counts_;

public:
    RecursiveRWLock() : write_count_(0), reader_count_(0) {}

    ~RecursiveRWLock() = default;

    RecursiveRWLock(const RecursiveRWLock&amp;) = delete;
    RecursiveRWLock&amp; operator=(const RecursiveRWLock&amp;) = delete;

    /**
     * Acquire read lock (can be called multiple times by same thread)
     */
    void lock_read() {
        std::unique_lock&lt;std::mutex&gt; lock(mutex_);
        std::thread::id tid = std::this_thread::get_id();

        // If this thread is the writer, just increment read count
        if (tid == writer_id_) {
            read_counts_[tid]++;
            return;
        }

        // Wait until no writer
        cv_.wait(lock, [this] { return write_count_ == 0; });

        read_counts_[tid]++;
        reader_count_++;
    }

    /**
     * Release read lock
     */
    void unlock_read() {
        std::unique_lock&lt;std::mutex&gt; lock(mutex_);
        std::thread::id tid = std::this_thread::get_id();

        auto it = read_counts_.find(tid);
        if (it != read_counts_.end() &amp;&amp; it-&gt;second &gt; 0) {
            it-&gt;second--;
            if (tid != writer_id_) {
                reader_count_--;
            }

            if (it-&gt;second == 0) {
                read_counts_.erase(it);
            }

            if (reader_count_ == 0) {
                cv_.notify_all();
            }
        }
    }

    /**
     * Acquire write lock (can be called multiple times by same thread)
     */
    void lock_write() {
        std::unique_lock&lt;std::mutex&gt; lock(mutex_);
        std::thread::id tid = std::this_thread::get_id();

        // If this thread already has write lock, just increment
        if (tid == writer_id_) {
            write_count_++;
            return;
        }

        // Wait until no readers and no writer
        cv_.wait(lock, [this] { return reader_count_ == 0 &amp;&amp; write_count_ == 0; });

        writer_id_ = tid;
        write_count_ = 1;
    }

    /**
     * Release write lock
     */
    void unlock_write() {
        std::unique_lock&lt;std::mutex&gt; lock(mutex_);
        std::thread::id tid = std::this_thread::get_id();

        if (tid == writer_id_ &amp;&amp; write_count_ &gt; 0) {
            write_count_--;

            if (write_count_ == 0) {
                writer_id_ = std::thread::id();
                cv_.notify_all();
            }
        }
    }

    /**
     * RAII guards
     */
    class ReadGuard {
        RecursiveRWLock&amp; lock_;
    public:
        explicit ReadGuard(RecursiveRWLock&amp; lock) : lock_(lock) {
            lock_.lock_read();
        }
        ~ReadGuard() {
            lock_.unlock_read();
        }
    };

    class WriteGuard {
        RecursiveRWLock&amp; lock_;
    public:
        explicit WriteGuard(RecursiveRWLock&amp; lock) : lock_(lock) {
            lock_.lock_write();
        }
        ~WriteGuard() {
            lock_.unlock_write();
        }
    };
};

// 5. RECURSIVE RW POINTER LOCK - Recursive RW Lock with Pointer Protection
// ============================================================================
/**
 * Combines recursive RW lock with pointer protection
 * Provides both reentrant locking and safe pointer access
 */
template&lt;typename T&gt;
class RecursiveRWPointerLock {
private:
    T* ptr_;
    RecursiveRWLock lock_;
    std::atomic&lt;uint64_t&gt; version_;

public:
    RecursiveRWPointerLock() : ptr_(nullptr), version_(0) {}

    explicit RecursiveRWPointerLock(T* ptr) : ptr_(ptr), version_(0) {}

    ~RecursiveRWPointerLock() = default;

    RecursiveRWPointerLock(const RecursiveRWPointerLock&amp;) = delete;
    RecursiveRWPointerLock&amp; operator=(const RecursiveRWPointerLock&amp;) = delete;

    /**
     * Access pointer for reading (shared lock)
     */
    class ReadAccess {
        RecursiveRWPointerLock&amp; parent_;
        typename RecursiveRWLock::ReadGuard guard_;

    public:
        explicit ReadAccess(RecursiveRWPointerLock&amp; parent)
            : parent_(parent), guard_(parent.lock_) {}

        const T* operator-&gt;() const { return parent_.ptr_; }
        const T&amp; operator*() const { return *parent_.ptr_; }
        const T* get() const { return parent_.ptr_; }

        uint64_t version() const {
            return parent_.version_.load(std::memory_order_acquire);
        }
    };

    /**
     * Access pointer for writing (exclusive lock)
     */
    class WriteAccess {
        RecursiveRWPointerLock&amp; parent_;
        typename RecursiveRWLock::WriteGuard guard_;

    public:
        explicit WriteAccess(RecursiveRWPointerLock&amp; parent)
            : parent_(parent), guard_(parent.lock_) {}

        T* operator-&gt;() { return parent_.ptr_; }
        T&amp; operator*() { return *parent_.ptr_; }
        T* get() { return parent_.ptr_; }

        void set(T* new_ptr) {
            parent_.ptr_ = new_ptr;
            parent_.version_.fetch_add(1, std::memory_order_release);
        }

        uint64_t version() const {
            return parent_.version_.load(std::memory_order_acquire);
        }
    };

    /**
     * Get read access (RAII)
     */
    ReadAccess read() {
        return ReadAccess(*this);
    }

    /**
     * Get write access (RAII)
     */
    WriteAccess write() {
        return WriteAccess(*this);
    }

    /**
     * Get current version
     */
    uint64_t version() const {
        return version_.load(std::memory_order_acquire);
    }
};

// EXAMPLE 2: Pointer Lock - Lock-free Pointer Updates
// ============================================================================
struct Node {
    int value;
    Node* next;
    Node(int v) : value(v), next(nullptr) {}
};

void example_pointer_lock() {
    print_divider(&quot;Pointer Lock - Lock-free Stack&quot;);

    PointerLock&lt;Node&gt; head;
    std::atomic&lt;int&gt; push_count{0};
    std::atomic&lt;int&gt; pop_count{0};

    const int NUM_THREADS = 4;
    const int OPS_PER_THREAD = 100;

    std::vector&lt;std::thread&gt; threads;

    // Pusher threads
    auto pusher = [&amp;](int thread_id) {
        for (int i = 0; i &lt; OPS_PER_THREAD; ++i) {
            Node* new_node = new Node(thread_id * 1000 + i);
            Node* old_head;

            do {
                old_head = head.load(std::memory_order_acquire);
                new_node-&gt;next = old_head;
            } while (!head.compare_exchange_weak(old_head, new_node));

            push_count.fetch_add(1, std::memory_order_relaxed);
        }
    };

    // Popper threads
    auto popper = [&amp;]() {
        for (int i = 0; i &lt; OPS_PER_THREAD; ++i) {
            Node* old_head;
            Node* new_head;

            do {
                old_head = head.load(std::memory_order_acquire);
                if (!old_head) break;
                new_head = old_head-&gt;next;
            } while (old_head &amp;&amp; !head.compare_exchange_weak(old_head, new_head));

            if (old_head) {
                delete old_head;
                pop_count.fetch_add(1, std::memory_order_relaxed);
            }
        }
    };

    std::cout &lt;&lt; &quot;Running lock-free stack with &quot; &lt;&lt; NUM_THREADS &lt;&lt; &quot; pushers and &quot; 
              &lt;&lt; NUM_THREADS &lt;&lt; &quot; poppers\\n&quot;;

    auto start = std::chrono::high_resolution_clock::now();

    for (int i = 0; i &lt; NUM_THREADS; ++i) {
        threads.emplace_back(pusher, i);
    }

    for (int i = 0; i &lt; NUM_THREADS; ++i) {
        threads.emplace_back(popper);
    }

    for (auto&amp; t : threads) {
        t.join();
    }

    auto end = std::chrono::high_resolution_clock::now();
    auto duration = std::chrono::duration_cast&lt;std::chrono::milliseconds&gt;(end - start);

    std::cout &lt;&lt; &quot;Pushes: &quot; &lt;&lt; push_count.load() &lt;&lt; &quot;\\n&quot;;
    std::cout &lt;&lt; &quot;Pops: &quot; &lt;&lt; pop_count.load() &lt;&lt; &quot;\\n&quot;;
    std::cout &lt;&lt; &quot;Remaining nodes: &quot; &lt;&lt; (push_count.load() - pop_count.load()) &lt;&lt; &quot;\\n&quot;;
    std::cout &lt;&lt; &quot;Time: &quot; &lt;&lt; duration.count() &lt;&lt; &quot; ms\\n&quot;;
    std::cout &lt;&lt; &quot;Final version: &quot; &lt;&lt; head.version() &lt;&lt; &quot;\\n&quot;;

    // Cleanup remaining nodes
    Node* current = head.load();
    while (current) {
        Node* next = current-&gt;next;
        delete current;
        current = next;
    }
}

}

void example_recursive_rwlock() {
    print_divider(&quot;Recursive RW Lock - Nested Calls&quot;);

    RecursiveRWLock rwlock;
    int shared_data = 0;

    // Function that acquires read lock and calls another function
    auto read_level_2 = [&amp;]() {
        RecursiveRWLock::ReadGuard guard(rwlock);
        std::cout &lt;&lt; &quot;  Level 2 read: &quot; &lt;&lt; shared_data &lt;&lt; &quot;\\n&quot;;
    };

    auto read_level_1 = [&amp;]() {
        RecursiveRWLock::ReadGuard guard(rwlock);
        std::cout &lt;&lt; &quot; Level 1 read: &quot; &lt;&lt; shared_data &lt;&lt; &quot;\\n&quot;;
        read_level_2();  // Nested read lock - should work!
    };

    // Function that acquires write lock and calls itself recursively
    std::function&lt;void(int)&gt; recursive_write = [&amp;](int depth) {
        RecursiveRWLock::WriteGuard guard(rwlock);
        shared_data++;
        std::cout &lt;&lt; &quot; Level &quot; &lt;&lt; depth &lt;&lt; &quot; write: &quot; &lt;&lt; shared_data &lt;&lt; &quot;\\n&quot;;

        if (depth &lt; 3) {
            recursive_write(depth + 1);  // Recursive write lock!
        }
    };

    std::cout &lt;&lt; &quot;Testing nested read locks:\\n&quot;;
    read_level_1();

    std::cout &lt;&lt; &quot;\\nTesting recursive write locks:\\n&quot;;
    recursive_write(1);

    std::cout &lt;&lt; &quot;\\nFinal shared_data: &quot; &lt;&lt; shared_data &lt;&lt; &quot;\\n&quot;;

    // Test with multiple threads
    std::cout &lt;&lt; &quot;\\nMulti-threaded recursive test:\\n&quot;;
    std::vector&lt;std::thread&gt; threads;

    for (int i = 0; i &lt; 3; ++i) {
        threads.emplace_back([&amp;, i]() {
            RecursiveRWLock::WriteGuard guard(rwlock);
            std::cout &lt;&lt; &quot;Thread &quot; &lt;&lt; i &lt;&lt; &quot; acquired write lock\\n&quot;;

            // Nested lock
            {
                RecursiveRWLock::WriteGuard nested(rwlock);
                shared_data += 10;
                std::cout &lt;&lt; &quot;Thread &quot; &lt;&lt; i &lt;&lt; &quot; has nested lock, data = &quot; &lt;&lt; shared_data &lt;&lt; &quot;\\n&quot;;
            }
        });
    }

    for (auto&amp; t : threads) {
        t.join();
    }

    std::cout &lt;&lt; &quot;Final value after multi-threaded: &quot; &lt;&lt; shared_data &lt;&lt; &quot;\\n&quot;;
}

struct Account {
    std::string name;
    double balance;

    Account(const std::string&amp; n, double b) : name(n), balance(b) {}

    void deposit(double amount) {
        balance += amount;
    }

    bool withdraw(double amount) {
        if (balance &gt;= amount) {
            balance -= amount;
            return true;
        }
        return false;
    }
};

void example_recursive_rw_pointer_lock() {
    print_divider(&quot;Recursive RW Pointer Lock - Account Management&quot;);

    Account* account = new Account(&quot;John Doe&quot;, 1000.0);
    RecursiveRWPointerLock&lt;Account&gt; locked_account(account);

    std::cout &lt;&lt; &quot;Initial account:\\n&quot;;
    {
        auto read_access = locked_account.read();
        std::cout &lt;&lt; &quot;  Name: &quot; &lt;&lt; read_access-&gt;name &lt;&lt; &quot;\\n&quot;;
        std::cout &lt;&lt; &quot;  Balance: $&quot; &lt;&lt; std::fixed &lt;&lt; std::setprecision(2) 
                  &lt;&lt; read_access-&gt;balance &lt;&lt; &quot;\\n&quot;;
        std::cout &lt;&lt; &quot;  Version: &quot; &lt;&lt; read_access.version() &lt;&lt; &quot;\\n&quot;;
    }

    // Multiple readers simultaneously
    std::vector&lt;std::thread&gt; readers;
    std::atomic&lt;int&gt; read_ops{0};

    for (int i = 0; i &lt; 5; ++i) {
        readers.emplace_back([&amp;, i]() {
            for (int j = 0; j &lt; 10; ++j) {
                auto read_access = locked_account.read();
                double balance = read_access-&gt;balance;
                read_ops.fetch_add(1);

                // Nested read (recursive!)
                {
                    auto nested_read = locked_account.read();
                    (void)nested_read-&gt;name;
                }

                std::this_thread::sleep_for(std::chrono::microseconds(10));
                (void)balance;
            }
        });
    }

    // Writer threads
    std::vector&lt;std::thread&gt; writers;
    std::atomic&lt;int&gt; write_ops{0};

    for (int i = 0; i &lt; 2; ++i) {
        writers.emplace_back([&amp;, i]() {
            for (int j = 0; j &lt; 5; ++j) {
                auto write_access = locked_account.write();
                write_access-&gt;deposit(10.0);
                write_ops.fetch_add(1);

                // Nested write (recursive!)
                {
                    auto nested_write = locked_account.write();
                    nested_write-&gt;deposit(5.0);
                }

                std::this_thread::sleep_for(std::chrono::milliseconds(1));
            }
        });
    }

    for (auto&amp; t : readers) t.join();
    for (auto&amp; t : writers) t.join();

    std::cout &lt;&lt; &quot;\\nAfter concurrent operations:\\n&quot;;
    {
        auto read_access = locked_account.read();
        std::cout &lt;&lt; &quot;  Name: &quot; &lt;&lt; read_access-&gt;name &lt;&lt; &quot;\\n&quot;;
        std::cout &lt;&lt; &quot;  Balance: $&quot; &lt;&lt; read_access-&gt;balance &lt;&lt; &quot;\\n&quot;;
        std::cout &lt;&lt; &quot;  Version: &quot; &lt;&lt; read_access.version() &lt;&lt; &quot;\\n&quot;;
    }

    std::cout &lt;&lt; &quot;\\nStatistics:\\n&quot;;
    std::cout &lt;&lt; &quot;  Read operations: &quot; &lt;&lt; read_ops.load() &lt;&lt; &quot;\\n&quot;;
    std::cout &lt;&lt; &quot;  Write operations: &quot; &lt;&lt; write_ops.load() &lt;&lt; &quot;\\n&quot;;
    std::cout &lt;&lt; &quot;  Expected balance: $&quot; &lt;&lt; (1000.0 + write_ops.load() * 15.0) &lt;&lt; &quot;\\n&quot;;

    // Update pointer
    std::cout &lt;&lt; &quot;\\nUpdating account pointer:\\n&quot;;
    Account* new_account = new Account(&quot;Jane Smith&quot;, 5000.0);
    {
        auto write_access = locked_account.write();
        delete account;
        write_access.set(new_account);
        std::cout &lt;&lt; &quot;  New account: &quot; &lt;&lt; write_access-&gt;name &lt;&lt; &quot;\\n&quot;;
        std::cout &lt;&lt; &quot;  New balance: $&quot; &lt;&lt; write_access-&gt;balance &lt;&lt; &quot;\\n&quot;;
        std::cout &lt;&lt; &quot;  New version: &quot; &lt;&lt; write_access.version() &lt;&lt; &quot;\\n&quot;;
    }

    // Cleanup
    {
        auto write_access = locked_account.write();
        delete write_access.get();
        write_access.set(nullptr);
    }
}

<h2 id="-overview">📋 Overview</h2>
<p>Proper synchronization is critical for concurrent programming. This implementation provides multiple lock types, each optimized for different scenarios:</p>
<ul>
<li><strong>MutexLock</strong>: Fast spinlock for short critical sections</li>
<li><strong>PointerLock</strong>: Lock-free atomic pointer with ABA protection</li>
<li><strong>ReadWriteLock</strong>: Multiple readers OR single writer</li>

<h2 id="-lock-types">🎯 Lock Types</h2>
<h3 id="1-mutex-lock-spinlock">1. Mutex Lock (Spinlock)</h3>
<p><strong>Strategy</strong>: Spin on atomic flag<br />
<strong>Complexity</strong>: O(1) lock/unlock<br />
<strong>Use Case</strong>: Short critical sections, low contention</p>
<p><strong>Characteristics:</strong>
- ✅ Ultra-fast: 15x faster than <code>std::mutex</code>!
- ✅ No system calls (pure userspace)
- ✅ RAII guard support
- ❌ Busy-waiting (wastes CPU on contention)
- ❌ Not fair (no queue)</p>
<h3 id="2-pointer-lock-lock-free">2. Pointer Lock (Lock-free)</h3>
<p><strong>Strategy</strong>: Atomic CAS with version counter<br />
<strong>Complexity</strong>: O(1) operations<br />
<strong>Use Case</strong>: Lock-free data structures, concurrent stacks/queues</p>
<p><strong>Characteristics:</strong>
- ✅ Lock-free (no blocking)
- ✅ ABA problem prevention via versioning
- ✅ Compare-and-swap operations
- ✅ Progress guarantee
- ❌ Retry loops under contention</p>
<h3 id="3-read-write-lock">3. Read-Write Lock</h3>
<p><strong>Strategy</strong>: Atomic counter + condition variable<br />
<strong>Complexity</strong>: O(1) lock/unlock<br />
<strong>Use Case</strong>: Read-heavy workloads, shared data structures</p>
<p><strong>Characteristics:</strong>
- ✅ Multiple concurrent readers
- ✅ Exclusive writer
- ✅ Read/write guards (RAII)
- ✅ try_lock support
- ❌ Writer starvation possible</p>
<h3 id="4-recursive-rw-lock">4. Recursive RW Lock</h3>

<strong>Complexity</strong>: O(1) lock/unlock<br />
<strong>Use Case</strong>: Nested function calls, reentrant code</p>
<p><strong>Characteristics:</strong>

- ✅ Separate read/write counts
- ✅ Writer can acquire read lock
- ✅ Natural for recursive algorithms
- ❌ Slightly higher overhead</p>
<h3 id="5-recursive-rw-pointer-lock">5. Recursive RW Pointer Lock</h3>

<strong>Complexity</strong>: O(1) operations<br />
<strong>Use Case</strong>: Protected shared pointers, safe pointer updates</p>
<p><strong>Characteristics:</strong>

<h2 id="-implementation-details">🏗️ Implementation Details</h2>
<h3 id="mutex-lock-spinlock">Mutex Lock (Spinlock)</h3>
<pre><code class="language-cpp">class MutexLock {
    std::atomic_flag flag_ = ATOMIC_FLAG_INIT;

public:
    void lock() {
        while (flag_.test_and_set(std::memory_order_acquire)) {
            std::this_thread::yield();  // Backoff
        }
    }

    void unlock() {
        flag_.clear(std::memory_order_release);
    }
};
</code></pre>
<p><strong>Algorithm:</strong>
1. Test-and-set atomic flag
2. Spin if already set
3. Yield to avoid busy-wait
4. Clear flag on unlock</p>
<h3 id="pointer-lock">Pointer Lock</h3>
<pre><code class="language-cpp">template&lt;typename T&gt;
class PointerLock {
    std::atomic&lt;T*&gt; ptr_;
    std::atomic&lt;uint64_t&gt; version_;  // ABA protection

public:
    bool compare_exchange_weak(T*&amp; expected, T* desired) {
        if (ptr_.compare_exchange_weak(expected, desired, ...)) {
            version_.fetch_add(1);  // Increment on change
            return true;
        }
        return false;
    }
};
</code></pre>
<p><strong>ABA Prevention:</strong>
- Version counter increments on every pointer change
- Even if pointer returns to same value, version differs
- Prevents ABA problem in lock-free algorithms</p>
<h3 id="read-write-lock">Read-Write Lock</h3>
<pre><code class="language-cpp">class ReadWriteLock {
    std::atomic&lt;int32_t&gt; readers_;  // Count of readers (negative = writer)
    std::mutex mutex_;
    std::condition_variable cv_;

public:
    void lock_read() {
        // Wait until no writer
        cv_.wait(lock, [this] { return readers_.load() &gt;= 0; });
        readers_.fetch_add(1);
    }

    void lock_write() {
        // Wait until no readers/writers
        cv_.wait(lock, [this] { return readers_.load() == 0; });
        readers_.store(WRITER_FLAG);
    }
};
</code></pre>
<p><strong>States:</strong>
- <code>readers_ &gt;= 0</code>: Number of active readers
- <code>readers_ &lt; 0</code>: Writer active

<h2 id="-advanced-topics">🎓 Advanced Topics</h2>
<h3 id="spinlock-vs-mutex-trade-offs">Spinlock vs Mutex Trade-offs</h3>
<p><strong>Spinlock (MutexLock):</strong>
- Fast for short locks (&lt; 100 cycles)
- Wastes CPU under contention
- Best on multi-core systems
- No priority inversion</p>
<p><strong>Mutex (std::mutex):</strong>
- Better for long locks
- Sleeps thread (saves CPU)
- Kernel involvement (slow)
- Priority inheritance</p>
<h3 id="lock-free-vs-wait-free">Lock-free vs Wait-free</h3>
<p><strong>Lock-free (PointerLock):</strong>
- At least one thread makes progress
- May have retry loops
- Bounded by system scheduler</p>
<p><strong>Wait-free:</strong>
- Every thread makes progress
- No retry loops
- Hard to implement correctly</p>
<h3 id="reader-writer-fairness">Reader-Writer Fairness</h3>
<p><strong>Reader-preference</strong> (current):
- Readers can starve writers
- Good for read-heavy workloads</p>
<p><strong>Writer-preference:</strong>
- Writers get priority
- Prevents writer starvation</p>
<p><strong>Fair:</strong>
- FIFO queue for both
- More complex implementation</p>

<pre><code class="language-cpp">// ❌ BAD: No version tracking

        else x-&gt;parent-&gt;left = y;
        y-&gt;right = x;
        x-&gt;parent = y;
    }

    void insert_fixup(Node* z) {
        while (z-&gt;parent-&gt;color == RED) {
            if (z-&gt;parent == z-&gt;parent-&gt;parent-&gt;left) {
                Node* y = z-&gt;parent-&gt;parent-&gt;right;
                if (y-&gt;color == RED) {
                    z-&gt;parent-&gt;color = BLACK;
                    y-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    z = z-&gt;parent-&gt;parent;
                } else {
                    if (z == z-&gt;parent-&gt;right) {
                        z = z-&gt;parent;
                        rotate_left(z);
                    }
                    z-&gt;parent-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    rotate_right(z-&gt;parent-&gt;parent);
                }
            } else {
                Node* y = z-&gt;parent-&gt;parent-&gt;left;
                if (y-&gt;color == RED) {
                    z-&gt;parent-&gt;color = BLACK;
                    y-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    z = z-&gt;parent-&gt;parent;
                } else {
                    if (z == z-&gt;parent-&gt;left) {
                        z = z-&gt;parent;
                        rotate_right(z);
                    }
                    z-&gt;parent-&gt;color = BLACK;
                    z-&gt;parent-&gt;parent-&gt;color = RED;
                    rotate_left(z-&gt;parent-&gt;parent);
                }
            }
        }
        root_-&gt;color = BLACK;
    }

    void transplant(Node* u, Node* v) {
        if (u-&gt;parent == nil_) root_ = v;
        else if (u == u-&gt;parent-&gt;left) u-&gt;parent-&gt;left = v;
        else u-&gt;parent-&gt;right = v;
        v-&gt;parent = u-&gt;parent;
    }

    Node* minimum(Node* node) const {
        while (node-&gt;left != nil_) node = node-&gt;left;
        return node;
    }

    Node* maximum(Node* node) const {
        while (node-&gt;right != nil_) node = node-&gt;right;
        return node;
    }

    void delete_fixup(Node* x) {
        while (x != root_ &amp;&amp; x-&gt;color == BLACK) {
            if (x == x-&gt;parent-&gt;left) {
                Node* w = x-&gt;parent-&gt;right;
                if (w-&gt;color == RED) {
                    w-&gt;color = BLACK;
                    x-&gt;parent-&gt;color = RED;
                    rotate_left(x-&gt;parent);
                    w = x-&gt;parent-&gt;right;
                }
                if (w-&gt;left-&gt;color == BLACK &amp;&amp; w-&gt;right-&gt;color == BLACK) {
                    w-&gt;color = RED;
                    x = x-&gt;parent;
                } else {
                    if (w-&gt;right-&gt;color == BLACK) {
                        w-&gt;left-&gt;color = BLACK;
                        w-&gt;color = RED;
                        rotate_right(w);
                        w = x-&gt;parent-&gt;right;
                    }
                    w-&gt;color = x-&gt;parent-&gt;color;
                    x-&gt;parent-&gt;color = BLACK;
                    w-&gt;right-&gt;color = BLACK;
                    rotate_left(x-&gt;parent);
                    x = root_;
                }
            } else {
                Node* w = x-&gt;parent-&gt;left;
                if (w-&gt;color == RED) {
                    w-&gt;color = BLACK;
                    x-&gt;parent-&gt;color = RED;
                    rotate_right(x-&gt;parent);
                    w = x-&gt;parent-&gt;left;
                }
                if (w-&gt;right-&gt;color == BLACK &amp;&amp; w-&gt;left-&gt;color == BLACK) {
                    w-&gt;color = RED;
                    x = x-&gt;parent;
                } else {
                    if (w-&gt;left-&gt;color == BLACK) {
                        w-&gt;right-&gt;color = BLACK;
                        w-&gt;color = RED;
                        rotate_left(w);
                        w = x-&gt;parent-&gt;left;
                    }
                    w-&gt;color = x-&gt;parent-&gt;color;
                    x-&gt;parent-&gt;color = BLACK;
                    w-&gt;left-&gt;color = BLACK;
                    rotate_right(x-&gt;parent);
                    x = root_;
                }
            }
        }
        x-&gt;color = BLACK;
    }

    Node* find_node(const Key&amp; key) const {
        Node* current = root_;
        while (current != nil_) {
            if (comp_(key, current-&gt;value.first)) {
                current = current-&gt;left;
            } else if (comp_(current-&gt;value.first, key)) {
                current = current-&gt;right;
            } else {
                return current;
            }
        }
        return nil_;
    }

    Node* copy_tree(Node* node, Node* parent, Node* other_nil) {
        if (node == other_nil) return nil_;
        Node* new_node = new Node(node-&gt;value.first, node-&gt;value.second, node-&gt;color);
        new_node-&gt;parent = parent;
        new_node-&gt;left = copy_tree(node-&gt;left, new_node, other_nil);
        new_node-&gt;right = copy_tree(node-&gt;right, new_node, other_nil);
        return new_node;
    }

    void delete_tree(Node* node) {
        if (node != nil_) {
            delete_tree(node-&gt;left);
            delete_tree(node-&gt;right);
            delete node;
        }
    }

public:
    using key_type = Key;
    using mapped_type = T;
    using value_type = std::pair&lt;const Key, T&gt;;
    using size_type = std::size_t;

    // Iterator class
    class iterator {
    private:
        Node* node_;
        Node* nil_;
        const Map* map_;

        friend class Map;
        iterator(Node* n, Node* nil, const Map* m) : node_(n), nil_(nil), map_(m) {}

    public:
        iterator() : node_(nullptr), nil_(nullptr), map_(nullptr) {}

        value_type&amp; operator*() { return node_-&gt;value; }
        const value_type&amp; operator*() const { return node_-&gt;value; }
        value_type* operator-&gt;() { return &amp;node_-&gt;value; }
        const value_type* operator-&gt;() const { return &amp;node_-&gt;value; }

        iterator&amp; operator++() {
            if (node_-&gt;right != nil_) {
                node_ = map_-&gt;minimum(node_-&gt;right);
            } else {
                Node* parent = node_-&gt;parent;
                while (parent != nil_ &amp;&amp; node_ == parent-&gt;right) {
                    node_ = parent;
                    parent = parent-&gt;parent;
                }
                node_ = parent;
            }
            return *this;
        }

        iterator operator++(int) {
            iterator tmp = *this;
            ++(*this);
            return tmp;
        }

        bool operator==(const iterator&amp; other) const { return node_ == other.node_; }
        bool operator!=(const iterator&amp; other) const { return node_ != other.node_; }
    };

    using const_iterator = iterator;

    // Constructors
    Map() : root_(nullptr), nil_(nullptr), size_(0) {
        init_nil();
    }

    Map(std::initializer_list&lt;value_type&gt; init) : Map() {
        for (const auto&amp; p : init) {
            insert(p);
        }
    }

    Map(const Map&amp; other) : Map() {
        root_ = copy_tree(other.root_, nil_, other.nil_);
        size_ = other.size_;
    }

    Map(Map&amp;&amp; other) noexcept
        : root_(other.root_), nil_(other.nil_), size_(other.size_), comp_(other.comp_) {
        other.root_ = nullptr;
        other.nil_ = nullptr;
        other.size_ = 0;
        other.init_nil();
    }

    ~Map() {
        clear();
        delete nil_;
    }

    // Assignment
    Map&amp; operator=(const Map&amp; other) {
        if (this != &amp;other) {
            clear();
            root_ = copy_tree(other.root_, nil_, other.nil_);
            size_ = other.size_;
        }
        return *this;
    }

    Map&amp; operator=(Map&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            clear();
            delete nil_;
            root_ = other.root_;
            nil_ = other.nil_;
            size_ = other.size_;
            comp_ = other.comp_;
            other.root_ = nullptr;
            other.nil_ = nullptr;
            other.size_ = 0;
            other.init_nil();
        }
        return *this;
    }

    // Element access
    T&amp; operator[](const Key&amp; key) {
        Node* node = find_node(key);
        if (node != nil_) {
            return node-&gt;value.second;
        }
        auto result = insert({key, T()});
        return result.first-&gt;second;
    }

    T&amp; at(const Key&amp; key) {
        Node* node = find_node(key);
        if (node == nil_) {
            throw std::out_of_range(&quot;Map::at: key not found&quot;);
        }
        return node-&gt;value.second;
    }

    const T&amp; at(const Key&amp; key) const {
        Node* node = find_node(key);
        if (node == nil_) {
            throw std::out_of_range(&quot;Map::at: key not found&quot;);
        }
        return node-&gt;value.second;
    }

    // Iterators
    iterator begin() {
        if (root_ == nil_) return iterator(nil_, nil_, this);
        return iterator(minimum(root_), nil_, this);
    }

    const_iterator begin() const {
        if (root_ == nil_) return const_iterator(nil_, nil_, this);
        return const_iterator(minimum(root_), nil_, this);
    }

    iterator end() {
        return iterator(nil_, nil_, this);
    }

    const_iterator end() const {
        return const_iterator(nil_, nil_, this);
    }

    // Capacity
    bool empty() const noexcept { return size_ == 0; }
    size_type size() const noexcept { return size_; }

    // Modifiers
    void clear() {
        delete_tree(root_);
        root_ = nil_;
        size_ = 0;
    }

    std::pair&lt;iterator, bool&gt; insert(const value_type&amp; value) {
        Node* parent = nil_;
        Node* current = root_;

        while (current != nil_) {
            parent = current;
            if (comp_(value.first, current-&gt;value.first)) {
                current = current-&gt;left;
            } else if (comp_(current-&gt;value.first, value.first)) {
                current = current-&gt;right;
            } else {
                return {iterator(current, nil_, this), false};
            }
        }

        Node* new_node = new Node(value.first, value.second, RED);
        new_node-&gt;left = nil_;
        new_node-&gt;right = nil_;
        new_node-&gt;parent = parent;

        if (parent == nil_) {
            root_ = new_node;
        } else if (comp_(value.first, parent-&gt;value.first)) {
            parent-&gt;left = new_node;
        } else {
            parent-&gt;right = new_node;
        }

        insert_fixup(new_node);
        ++size_;
        return {iterator(new_node, nil_, this), true};
    }

    size_type erase(const Key&amp; key) {
        Node* z = find_node(key);
        if (z == nil_) return 0;

        Node* y = z;
        Node* x;
        Color y_original_color = y-&gt;color;

        if (z-&gt;left == nil_) {
            x = z-&gt;right;
            transplant(z, z-&gt;right);
        } else if (z-&gt;right == nil_) {
            x = z-&gt;left;
            transplant(z, z-&gt;left);
        } else {
            y = minimum(z-&gt;right);
            y_original_color = y-&gt;color;
            x = y-&gt;right;

            if (y-&gt;parent == z) {
                x-&gt;parent = y;
            } else {
                transplant(y, y-&gt;right);
                y-&gt;right = z-&gt;right;
                y-&gt;right-&gt;parent = y;
            }

            transplant(z, y);
            y-&gt;left = z-&gt;left;
            y-&gt;left-&gt;parent = y;
            y-&gt;color = z-&gt;color;
        }

        if (y_original_color == BLACK) {
            delete_fixup(x);
        }

        delete z;
        --size_;
        return 1;
    }

    // Lookup
    iterator find(const Key&amp; key) {
        Node* node = find_node(key);
        return iterator(node, nil_, this);
    }

    const_iterator find(const Key&amp; key) const {
        Node* node = find_node(key);
        return const_iterator(node, nil_, this);
    }

    size_type count(const Key&amp; key) const {
        return find_node(key) != nil_ ? 1 : 0;
    }

    bool contains(const Key&amp; key) const {
        return find_node(key) != nil_;
    }
};

#endif // MAP_HPP

<p>Red-Black Tree based ordered key-value container.</p>
<h2 id="features">Features</h2>
<ul>
<li><strong>Ordered</strong>: Keys sorted automatically</li>
<li><strong>Unique Keys</strong>: No duplicate keys</li>
<li><strong>O(log n)</strong>: Insert, find, erase operations</li>
<li><strong>Key-Value</strong>: Associate values with keys</li>
<li><strong>operator[]</strong>: Direct element access</li>
</ul>
<h2 id="quick-example">Quick Example</h2>
<pre><code class="language-cpp">Map&lt;std::string, int&gt; ages;
ages[&quot;Alice&quot;] = 30;
ages[&quot;Bob&quot;] = 25;

int age = ages[&quot;Alice&quot;];  // Access value
ages.erase(&quot;Bob&quot;);        // Remove key
bool has = ages.contains(&quot;Alice&quot;);

for (const auto&amp; p : ages) {  // Iterate in key order
    std::cout &lt;&lt; p.first &lt;&lt; &quot;: &quot; &lt;&lt; p.second &lt;&lt; &quot;\\n&quot;;
}
</code></pre>
<h2 id="operations">Operations</h2>
<ul>
<li><code>operator[key]</code> - Access/insert element (O(log n))</li>
<li><code>at(key)</code> - Access with bounds check (O(log n))</li>
<li><code>insert({key, value})</code> - Add pair (O(log n))</li>
<li><code>erase(key)</code> - Remove by key (O(log n))</li>
<li><code>find(key)</code>, <code>contains(key)</code> - Lookup (O(log n))</li>
</ul>
<p>See <code>map_example.cpp</code> for comprehensive examples.</p>` },

<pre><code class="language-cpp">#ifndef MULTIMAP_HPP
#define MULTIMAP_HPP

#include &lt;cstddef&gt;
#include &lt;vector&gt;
#include &lt;utility&gt;
#include &lt;algorithm&gt;
#include &lt;functional&gt;
#include &lt;initializer_list&gt;

/**
 * @brief Multimap implementation (allows duplicate keys)
 * Uses sorted vector of pairs for simplicity
 */
template&lt;typename Key, typename T, typename Compare = std::less&lt;Key&gt;&gt;
class Multimap {
private:
    using value_type_internal = std::pair&lt;Key, T&gt;;
    std::vector&lt;value_type_internal&gt; data_;
    Compare comp_;

    struct KeyCompare {
        Compare comp;
        bool operator()(const value_type_internal&amp; a, const value_type_internal&amp; b) const {
            return comp(a.first, b.first);
        }
        bool operator()(const value_type_internal&amp; a, const Key&amp; b) const {
            return comp(a.first, b);
        }
        bool operator()(const Key&amp; a, const value_type_internal&amp; b) const {
            return comp(a, b.first);
        }
    };

public:
    using key_type = Key;
    using mapped_type = T;
    using value_type = std::pair&lt;const Key, T&gt;;
    using size_type = std::size_t;
    using iterator = typename std::vector&lt;value_type_internal&gt;::const_iterator;
    using const_iterator = typename std::vector&lt;value_type_internal&gt;::const_iterator;

    Multimap() = default;

    Multimap(std::initializer_list&lt;value_type&gt; init) {
        for (const auto&amp; p : init) {
            insert(p);
        }
    }

    iterator begin() const { return data_.begin(); }
    iterator end() const { return data_.end(); }

    bool empty() const { return data_.empty(); }
    size_type size() const { return data_.size(); }

    void clear() { data_.clear(); }

    iterator insert(const value_type&amp; value) {
        KeyCompare key_comp{comp_};
        auto pos = std::lower_bound(data_.begin(), data_.end(), value.first, key_comp);
        return data_.insert(pos, value_type_internal(value.first, value.second));
    }

    size_type erase(const Key&amp; key) {
        KeyCompare key_comp{comp_};
        auto range = std::equal_range(data_.begin(), data_.end(), key, key_comp);
        size_type count = std::distance(range.first, range.second);
        data_.erase(range.first, range.second);
        return count;
    }

    iterator find(const Key&amp; key) const {
        KeyCompare key_comp{comp_};
        auto it = std::lower_bound(data_.begin(), data_.end(), key, key_comp);
        if (it != data_.end() &amp;&amp; !comp_(key, it-&gt;first) &amp;&amp; !comp_(it-&gt;first, key)) {
            return it;
        }
        return data_.end();
    }

    size_type count(const Key&amp; key) const {
        KeyCompare key_comp{comp_};
        auto range = std::equal_range(data_.begin(), data_.end(), key, key_comp);
        return std::distance(range.first, range.second);
    }

    bool contains(const Key&amp; key) const {
        return find(key) != data_.end();
    }
};

#endif // MULTIMAP_HPP

<pre><code class="language-cpp">#ifndef MULTISET_HPP
#define MULTISET_HPP

#include &lt;cstddef&gt;
#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;functional&gt;
#include &lt;initializer_list&gt;

/**
 * @brief Multiset implementation (allows duplicates)
 * Uses sorted vector for simplicity - O(n) insert, O(log n) search
 */
template&lt;typename T, typename Compare = std::less&lt;T&gt;&gt;
class Multiset {
private:
    std::vector&lt;T&gt; data_;
    Compare comp_;

public:
    using value_type = T;
    using size_type = std::size_t;
    using iterator = typename std::vector&lt;T&gt;::const_iterator;
    using const_iterator = typename std::vector&lt;T&gt;::const_iterator;

    Multiset() = default;

    Multiset(std::initializer_list&lt;T&gt; init) {
        for (const auto&amp; val : init) {
            insert(val);
        }
    }

    iterator begin() const { return data_.begin(); }
    iterator end() const { return data_.end(); }

    bool empty() const { return data_.empty(); }
    size_type size() const { return data_.size(); }

    void clear() { data_.clear(); }

    iterator insert(const T&amp; value) {
        auto pos = std::lower_bound(data_.begin(), data_.end(), value, comp_);
        return data_.insert(pos, value);
    }

    size_type erase(const T&amp; value) {
        auto range = std::equal_range(data_.begin(), data_.end(), value, comp_);
        size_type count = std::distance(range.first, range.second);
        data_.erase(range.first, range.second);
        return count;
    }

    iterator find(const T&amp; value) const {
        auto it = std::lower_bound(data_.begin(), data_.end(), value, comp_);
        if (it != data_.end() &amp;&amp; !comp_(value, *it) &amp;&amp; !comp_(*it, value)) {
            return it;
        }
        return data_.end();
    }

<pre><code class="language-cpp">#ifndef OPTIONAL_HPP
#define OPTIONAL_HPP

#include &lt;stdexcept&gt;
#include &lt;utility&gt;

/**
 * @brief Optional value (may or may not contain a value)
 * C++17 feature for safer null handling
 */
template&lt;typename T&gt;
class Optional {
private:
    alignas(T) unsigned char storage_[sizeof(T)];
    bool has_value_;

    T* ptr() { return reinterpret_cast&lt;T*&gt;(storage_); }
    const T* ptr() const { return reinterpret_cast&lt;const T*&gt;(storage_); }

public:
    Optional() : has_value_(false) {}

    Optional(const T&amp; value) : has_value_(true) {
        new (storage_) T(value);
    }

    Optional(T&amp;&amp; value) : has_value_(true) {
        new (storage_) T(std::move(value));
    }

    ~Optional() {
        if (has_value_) ptr()-&gt;~T();
    }

    Optional(const Optional&amp; other) : has_value_(other.has_value_) {
        if (has_value_) new (storage_) T(*other.ptr());
    }

    Optional(Optional&amp;&amp; other) noexcept : has_value_(other.has_value_) {
        if (has_value_) {
            new (storage_) T(std::move(*other.ptr()));
            other.reset();
        }
    }

    Optional&amp; operator=(const Optional&amp; other) {
        if (this != &amp;other) {
            if (has_value_) ptr()-&gt;~T();
            has_value_ = other.has_value_;
            if (has_value_) new (storage_) T(*other.ptr());
        }
        return *this;
    }

    bool has_value() const { return has_value_; }
    explicit operator bool() const { return has_value_; }

    T&amp; value() {
        if (!has_value_) throw std::runtime_error(&quot;Optional::value: no value&quot;);
        return *ptr();
    }

    const T&amp; value() const {
        if (!has_value_) throw std::runtime_error(&quot;Optional::value: no value&quot;);
        return *ptr();
    }

    T value_or(const T&amp; default_value) const {
        return has_value_ ? *ptr() : default_value;
    }

    T&amp; operator*() { return *ptr(); }
    const T&amp; operator*() const { return *ptr(); }
    T* operator-&gt;() { return ptr(); }
    const T* operator-&gt;() const { return ptr(); }

    void reset() {
        if (has_value_) {
            ptr()-&gt;~T();
            has_value_ = false;
        }
    }
};

#endif // OPTIONAL_HPP

</code></pre>` },

<p>A C++ implementation of <code>std::optional</code> (C++17) - a container that may or may not contain a value.</p>
<h2 id="-overview">📋 Overview</h2>
<p><code>Optional&lt;T&gt;</code> represents a value that might be absent, providing a type-safe alternative to using pointers or sentinel values (like -1, nullptr) to indicate &ldquo;no value&rdquo;. It&rsquo;s a modern C++ idiom for handling potentially missing data without exceptions or null pointer dereferences.</p>
<h2 id="-key-features">🎯 Key Features</h2>
<ul>
<li><strong>Type-Safe Null Handling</strong>: No need for nullptr or sentinel values</li>
<li><strong>Explicit Empty State</strong>: Clear distinction between &ldquo;no value&rdquo; and &ldquo;value is default&rdquo;</li>
<li><strong>Value or Default</strong>: Easy fallback with <code>value_or()</code></li>
<li><strong>In-place Storage</strong>: No heap allocation</li>
<li><strong>Exception Safety</strong>: Strong exception guarantees</li>
<li><strong>Move Semantics</strong>: Efficient transfer of values</li>
</ul>
<h2 id="-implementation-details">🏗️ Implementation Details</h2>
<h3 id="data-structure">Data Structure</h3>
<pre><code class="language-cpp">template&lt;typename T&gt;
class Optional {
private:
    alignas(T) unsigned char storage_[sizeof(T)];  // Aligned raw storage
    bool has_value_;                                // State flag

    // Placement new for construction
    // Manual destructor calls for destruction
};
</code></pre>
<h3 id="key-techniques">Key Techniques</h3>
<ul>
<li><strong>Placement New</strong>: Construct objects in pre-allocated storage</li>
<li><strong>Aligned Storage</strong>: Ensure proper alignment for type T</li>
<li><strong>Manual Lifetime Management</strong>: Explicit construction/destruction</li>
</ul>
<h3 id="complexity">Complexity</h3>
<ul>
<li><strong>Construction</strong>: O(1)</li>
<li><strong>Access</strong>: O(1)</li>
<li><strong>Destruction</strong>: O(1)</li>
<li><strong>Space</strong>: sizeof(T) + sizeof(bool) + alignment padding</li>
</ul>
<h2 id="-core-operations">📚 Core Operations</h2>
<h3 id="construction">Construction</h3>
<pre><code class="language-cpp">Optional&lt;int&gt; opt1;              // Empty optional
Optional&lt;int&gt; opt2(42);          // Optional with value
Optional&lt;std::string&gt; opt3(&quot;hi&quot;); // Works with any type
</code></pre>
<h3 id="checking-for-value">Checking for Value</h3>
<pre><code class="language-cpp">if (opt.has_value()) { }         // Explicit check
if (opt) { }                     // Implicit bool conversion
</code></pre>
<h3 id="accessing-value">Accessing Value</h3>
<pre><code class="language-cpp">int val = opt.value();           // Throws if empty
int val = *opt;                  // Unsafe (like raw pointer)
int val = opt.value_or(99);      // Safe with default
</code></pre>
<h3 id="resetting">Resetting</h3>
<pre><code class="language-cpp">opt.reset();                     // Clear the value
</code></pre>
<h2 id="-usage-examples">🚀 Usage Examples</h2>
<h3 id="basic-usage">Basic Usage</h3>
<pre><code class="language-cpp">Optional&lt;int&gt; divide(int a, int b) {
    if (b == 0) return Optional&lt;int&gt;();  // Return empty
    return Optional&lt;int&gt;(a / b);
}

auto result = divide(10, 2);
if (result) {
    std::cout &lt;&lt; &quot;Result: &quot; &lt;&lt; *result &lt;&lt; &quot;\\n&quot;;
}
</code></pre>
<h3 id="safe-default-values">Safe Default Values</h3>
<pre><code class="language-cpp">Optional&lt;std::string&gt; get_username();

std::string name = get_username().value_or(&quot;Guest&quot;);
std::cout &lt;&lt; &quot;Welcome, &quot; &lt;&lt; name &lt;&lt; &quot;\\n&quot;;
</code></pre>
<h3 id="configuration-pattern">Configuration Pattern</h3>
<pre><code class="language-cpp">struct Config {
    Optional&lt;int&gt; port;
    Optional&lt;std::string&gt; host;
};

Config config;  // User doesn't provide config

int port = config.port.value_or(8080);        // Use default
std::string host = config.host.value_or(&quot;localhost&quot;);
</code></pre>
<h3 id="complex-types">Complex Types</h3>
<pre><code class="language-cpp">struct User {
    std::string name;
    int age;
};

Optional&lt;User&gt; find_user(int id);

if (auto user = find_user(123)) {
    std::cout &lt;&lt; user-&gt;name;  // Use arrow operator
}
</code></pre>
<h2 id="-when-to-use">🔍 When to Use</h2>
<h3 id="use-optional-when">Use Optional When:</h3>
<ul>
<li>✅ Function might not return a value (alternative to exceptions)</li>
<li>✅ Field might be uninitialized or absent</li>
<li>✅ You want to avoid sentinel values (-1, nullptr, &ldquo;&rdquo;)</li>
<li>✅ Explicit &ldquo;no value&rdquo; is semantically important</li>
<li>✅ You want type-safe null handling</li>
</ul>
<h3 id="use-other-approaches-when">Use Other Approaches When:</h3>
<ul>
<li>❌ Value is always present → Use T directly</li>
<li>❌ Multiple error conditions → Use exceptions or Result<T, E></li>
<li>❌ Performance critical path with always-present values → Use T</li>
<li>❌ Need to distinguish multiple empty states → Use enum or variant</li>
</ul>
<h2 id="-comparison-with-alternatives">🆚 Comparison with Alternatives</h2>
<table>
<thead>
<tr>
<th>Approach</th>
<th>Type Safety</th>
<th>Semantics</th>
<th>Overhead</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Optional<T></strong></td>
<td>✅ Strong</td>
<td>Clear &ldquo;maybe&rdquo;</td>
<td>bool flag</td>
</tr>
<tr>
<td><strong>T*</strong></td>
<td>❌ Weak</td>
<td>Unclear lifetime</td>
<td>Pointer size</td>
</tr>
<tr>
<td><strong>Sentinel (-1)</strong></td>
<td>❌ None</td>
<td>Ambiguous</td>
<td>None</td>
</tr>
<tr>
<td><strong>Exception</strong></td>
<td>✅ Strong</td>
<td>Error handling</td>
<td>Call stack</td>
</tr>
<tr>
<td><strong>Pair<bool, T></strong></td>
<td>⚠️ Manual</td>
<td>Verbose</td>
<td>bool + T</td>
</tr>
</tbody>
</table>
<h2 id="-special-features">🎓 Special Features</h2>
<h3 id="value-vs-value_or">value() vs value_or()</h3>
<pre><code class="language-cpp">Optional&lt;int&gt; opt;

// value() - throws if empty (use when you expect a value)
try {
    int val = opt.value();
} catch (...) { }

// value_or() - returns default if empty (use for fallback)
int val = opt.value_or(42);  // No exception, returns 42
</code></pre>
<h3 id="bool-conversion">Bool Conversion</h3>
<pre><code class="language-cpp">Optional&lt;int&gt; opt(0);  // Value is 0

if (opt) {
    // This executes! Optional is not empty even though value is 0
    std::cout &lt;&lt; *opt;  // Prints: 0
}
</code></pre>
<h3 id="pointer-like-access">Pointer-like Access</h3>
<pre><code class="language-cpp">struct Point { int x, y; };
Optional&lt;Point&gt; opt(Point{10, 20});

opt-&gt;x = 30;           // Modify through arrow operator
std::cout &lt;&lt; (*opt).y; // Dereference and access
</code></pre>
<h2 id="-best-practices">💡 Best Practices</h2>
<ol>
<li><strong>Prefer value_or() for Defaults</strong>: More readable than if-else</li>
<li><strong>Check Before Dereferencing</strong>: Use <code>if (opt)</code> before <code>*opt</code></li>
<li><strong>Use value() When You Expect Value</strong>: Makes bugs visible</li>
<li><strong>Return Optional from Functions</strong>: Better than sentinel values</li>
<li><strong>Don&rsquo;t Overuse</strong>: If value is always present, use T directly</li>
</ol>
<h2 id="-common-patterns">📊 Common Patterns</h2>
<h3 id="safe-division">Safe Division</h3>
<pre><code class="language-cpp">Optional&lt;double&gt; safe_divide(double a, double b) {
    if (b == 0.0) return Optional&lt;double&gt;();
    return Optional&lt;double&gt;(a / b);
}
</code></pre>
<h3 id="database-lookup">Database Lookup</h3>
<pre><code class="language-cpp">Optional&lt;User&gt; find_by_id(int id) {
    if (/* found in DB */) return Optional&lt;User&gt;(user);
    return Optional&lt;User&gt;();
}
</code></pre>
<h3 id="configuration-with-defaults">Configuration with Defaults</h3>

<pre><code class="language-cpp">#ifndef PAIR_HPP
#define PAIR_HPP

#include &lt;utility&gt;

/**
 * @brief Pair of two values
 * Used extensively in map/set
 */
template&lt;typename T1, typename T2&gt;
struct Pair {
    T1 first;
    T2 second;

    Pair() : first(), second() {}
    Pair(const T1&amp; f, const T2&amp; s) : first(f), second(s) {}
    Pair(T1&amp;&amp; f, T2&amp;&amp; s) : first(std::move(f)), second(std::move(s)) {}

    Pair(const Pair&amp;) = default;
    Pair(Pair&amp;&amp;) = default;
    Pair&amp; operator=(const Pair&amp;) = default;
    Pair&amp; operator=(Pair&amp;&amp;) = default;

    bool operator==(const Pair&amp; other) const {
        return first == other.first &amp;&amp; second == other.second;
    }

    bool operator!=(const Pair&amp; other) const {
        return !(*this == other);
    }

    bool operator&lt;(const Pair&amp; other) const {
        return first &lt; other.first || (!(other.first &lt; first) &amp;&amp; second &lt; other.second);
    }
};

template&lt;typename T1, typename T2&gt;
Pair&lt;T1, T2&gt; make_pair(T1&amp;&amp; t1, T2&amp;&amp; t2) {
    return Pair&lt;T1, T2&gt;(std::forward&lt;T1&gt;(t1), std::forward&lt;T2&gt;(t2));
}

#endif // PAIR_HPP

<pre><code class="language-cpp">#ifndef PRIORITY_QUEUE_HPP
#define PRIORITY_QUEUE_HPP

#include &lt;cstddef&gt;
#include &lt;vector&gt;
#include &lt;functional&gt;
#include &lt;stdexcept&gt;
#include &lt;utility&gt;

/**
 * @brief Priority Queue implementation using binary heap
 * 
 * A container adapter providing constant time lookup of the largest (by default) element.
 * 
 * Key characteristics:
 * - Max heap by default (largest element at top)
 * - O(log n) insertion and removal
 * - O(1) access to top element
 * - Implemented using binary heap stored in vector
 */

template&lt;typename T, typename Container = std::vector&lt;T&gt;, typename Compare = std::less&lt;T&gt;&gt;
class PriorityQueue {
private:
    Container c_;       // Underlying container
    Compare comp_;      // Comparison function

    /**
     * @brief Get parent index
     */
    size_t parent(size_t i) const {
        return (i - 1) / 2;
    }

    /**
     * @brief Get left child index
     */
    size_t left(size_t i) const {
        return 2 * i + 1;
    }

    /**
     * @brief Get right child index
     */
    size_t right(size_t i) const {
        return 2 * i + 2;
    }

    /**
     * @brief Bubble up element at index i to maintain heap property
     * Used after insertion
     */
    void heapify_up(size_t i) {
        while (i &gt; 0 &amp;&amp; comp_(c_[parent(i)], c_[i])) {
            std::swap(c_[i], c_[parent(i)]);
            i = parent(i);
        }
    }

    /**
     * @brief Bubble down element at index i to maintain heap property
     * Used after removal
     */
    void heapify_down(size_t i) {
        size_t largest = i;
        size_t l = left(i);
        size_t r = right(i);

        // Find largest among node and its children
        if (l &lt; c_.size() &amp;&amp; comp_(c_[largest], c_[l])) {
            largest = l;
        }
        if (r &lt; c_.size() &amp;&amp; comp_(c_[largest], c_[r])) {
            largest = r;
        }

        // If largest is not current node, swap and continue
        if (largest != i) {
            std::swap(c_[i], c_[largest]);
            heapify_down(largest);
        }
    }

    /**
     * @brief Build heap from unsorted data (Floyd's algorithm)
     * O(n) time complexity
     */
    void build_heap() {
        // Start from last non-leaf node and heapify down
        if (c_.size() &lt;= 1) return;

        for (int i = parent(c_.size() - 1); i &gt;= 0; --i) {
            heapify_down(static_cast&lt;size_t&gt;(i));
        }
    }

public:
    using value_type = T;
    using size_type = std::size_t;
    using reference = T&amp;;
    using const_reference = const T&amp;;
    using container_type = Container;
    using value_compare = Compare;

    // ============================================================================
    // CONSTRUCTORS
    // ============================================================================

    /**
     * @brief Default constructor
     */
    PriorityQueue() : c_(), comp_() {}

    /**
     * @brief Constructor with custom comparator
     */
    explicit PriorityQueue(const Compare&amp; compare) : c_(), comp_(compare) {}

    /**
     * @brief Constructor with custom comparator and container
     */
    PriorityQueue(const Compare&amp; compare, const Container&amp; cont)
        : c_(cont), comp_(compare) {
        build_heap();
    }

    /**
     * @brief Constructor with custom comparator and move container
     */
    PriorityQueue(const Compare&amp; compare, Container&amp;&amp; cont)
        : c_(std::move(cont)), comp_(compare) {
        build_heap();
    }

    /**
     * @brief Range constructor
     */
    template&lt;typename InputIt&gt;
    PriorityQueue(InputIt first, InputIt last, const Compare&amp; compare = Compare())
        : c_(first, last), comp_(compare) {
        build_heap();
    }

    /**
     * @brief Copy constructor
     */
    PriorityQueue(const PriorityQueue&amp; other) : c_(other.c_), comp_(other.comp_) {}

    /**
     * @brief Move constructor
     */
    PriorityQueue(PriorityQueue&amp;&amp; other) noexcept
        : c_(std::move(other.c_)), comp_(std::move(other.comp_)) {}

    /**
     * @brief Destructor
     */
    ~PriorityQueue() = default;

    // ============================================================================
    // ASSIGNMENT OPERATORS
    // ============================================================================

    /**
     * @brief Copy assignment
     */
    PriorityQueue&amp; operator=(const PriorityQueue&amp; other) {
        if (this != &amp;other) {
            c_ = other.c_;
            comp_ = other.comp_;
        }
        return *this;
    }

    /**
     * @brief Move assignment
     */
    PriorityQueue&amp; operator=(PriorityQueue&amp;&amp; other) noexcept {
        if (this != &amp;other) {
            c_ = std::move(other.c_);
            comp_ = std::move(other.comp_);
        }
        return *this;
    }

    // ============================================================================
    // ELEMENT ACCESS
    // ============================================================================

    /**
     * @brief Access the top element (highest priority)
     * @return const reference to top element
     * @throws std::out_of_range if queue is empty
     */
    const_reference top() const {
        if (empty()) {
            throw std::out_of_range(&quot;PriorityQueue::top: queue is empty&quot;);
        }
        return c_.front();
    }

    // ============================================================================
    // CAPACITY
    // ============================================================================

    /**
     * @brief Check if queue is empty
     */
    bool empty() const noexcept {
        return c_.empty();
    }

    /**
     * @brief Get number of elements
     */
    size_type size() const noexcept {
        return c_.size();
    }

    // ============================================================================
    // MODIFIERS
    // ============================================================================

    /**
     * @brief Insert element (copy)
     * Time complexity: O(log n)
     */
    void push(const value_type&amp; value) {
        c_.push_back(value);
        heapify_up(c_.size() - 1);
    }

    /**
     * @brief Insert element (move)
     * Time complexity: O(log n)
     */
    void push(value_type&amp;&amp; value) {
        c_.push_back(std::move(value));
        heapify_up(c_.size() - 1);
    }

    /**
     * @brief Construct element in-place
     * Time complexity: O(log n)
     */
    template&lt;typename... Args&gt;
    void emplace(Args&amp;&amp;... args) {
        c_.emplace_back(std::forward&lt;Args&gt;(args)...);
        heapify_up(c_.size() - 1);
    }

    /**
     * @brief Remove top element
     * Time complexity: O(log n)
     * @throws std::out_of_range if queue is empty
     */
    void pop() {
        if (empty()) {
            throw std::out_of_range(&quot;PriorityQueue::pop: queue is empty&quot;);
        }

        // Move last element to top and heapify down
        c_.front() = std::move(c_.back());
        c_.pop_back();

        if (!empty()) {
            heapify_down(0);
        }
    }

    /**
     * @brief Swap contents with another priority queue
     */
    void swap(PriorityQueue&amp; other) noexcept {
        std::swap(c_, other.c_);
        std::swap(comp_, other.comp_);
    }

    // ============================================================================
    // COMPARISON (for testing/debugging)
    // ============================================================================

    /**
     * @brief Check if heap property is satisfied (for testing)
     */
    bool is_heap() const {
        for (size_t i = 0; i &lt; c_.size(); ++i) {
            size_t l = left(i);
            size_t r = right(i);

            if (l &lt; c_.size() &amp;&amp; comp_(c_[i], c_[l])) {
                return false;
            }
            if (r &lt; c_.size() &amp;&amp; comp_(c_[i], c_[r])) {
                return false;
            }
        }
        return true;
    }
};

/**
 * @brief Swap specialization
 */
template&lt;typename T, typename Container, typename Compare&gt;
void swap(PriorityQueue&lt;T, Container, Compare&gt;&amp; lhs,
          PriorityQueue&lt;T, Container, Compare&gt;&amp; rhs) noexcept {
    lhs.swap(rhs);
}

#endif // PRIORITY_QUEUE_HPP


</code></pre>` },

    explicit Queue(const Container&amp; cont) : c_(cont) {}

     */
    explicit Queue(Container&amp;&amp; cont) : c_(std::move(cont)) {}

    /**

    Queue(const Queue&amp; other) : c_(other.c_) {}

    Queue(Queue&amp;&amp; other) noexcept : c_(std::move(other.c_)) {}

    ~Queue() = default;

        return *this;

    reference front() {

    const_reference front() const {

    /**

    reference back() {

    /**

        return c_.empty();
    }

    /**
     * @brief Get number of elements
     */
    size_type size() const noexcept {
        return c_.size();
    }

    // ============================================================================
    // MODIFIERS
    // ============================================================================

    /**
     * @brief Push element to back of queue (copy)
     * Time complexity: O(1)
     */
    void push(const value_type&amp; value) {
        c_.push_back(value);
    }

    /**
     * @brief Push element to back of queue (move)
     * Time complexity: O(1)
     */
    void push(value_type&amp;&amp; value) {
        c_.push_back(std::move(value));
    }

    /**
     * @brief Construct element in-place at back
     * Time complexity: O(1)
     */
    template&lt;typename... Args&gt;
    void emplace(Args&amp;&amp;... args) {
        c_.emplace_back(std::forward&lt;Args&gt;(args)...);
    }

    /**
     * @brief Remove front element
     * Time complexity: O(1)
     */
    void pop() {
        c_.pop_front();
    }

    /**
     * @brief Swap contents with another queue
     */
    void swap(Queue&amp; other) noexcept {
        std::swap(c_, other.c_);
    }

    // ============================================================================
    // COMPARISON OPERATORS
    // ============================================================================

    /**
     * @brief Equality comparison
     */
    friend bool operator==(const Queue&amp; lhs, const Queue&amp; rhs) {
        return lhs.c_ == rhs.c_;
    }

    /**
     * @brief Inequality comparison
     */
    friend bool operator!=(const Queue&amp; lhs, const Queue&amp; rhs) {
        return !(lhs == rhs);
    }

    /**
     * @brief Less than comparison
     */
    friend bool operator&lt;(const Queue&amp; lhs, const Queue&amp; rhs) {
        return lhs.c_ &lt; rhs.c_;
    }

    /**
     * @brief Less than or equal comparison
     */
    friend bool operator&lt;=(const Queue&amp; lhs, const Queue&amp; rhs) {
        return !(rhs &lt; lhs);
    }

    /**
     * @brief Greater than comparison
     */
    friend bool operator&gt;(const Queue&amp; lhs, const Queue&amp; rhs) {
        return rhs &lt; lhs;
    }

    /**
     * @brief Greater than or equal comparison
     */
    friend bool operator&gt;=(const Queue&amp; lhs, const Queue&amp; rhs) {
        return !(lhs &lt; rhs);
    }
};

/**
 * @brief Swap specialization
 */
template&lt;typename T, typename Container&gt;
void swap(Queue&lt;T, Container&gt;&amp; lhs, Queue&lt;T, Container&gt;&amp; rhs) noexcept {
    lhs.swap(rhs);
}

<p>FIFO (First In, First Out) container adapter providing queue operations.</p>
<h2 id="features">Features</h2>
<ul>
<li><strong>FIFO Access</strong>: First element added is first to be removed</li>
<li><strong>O(1) Operations</strong>: Constant time push, pop, front, and back</li>
<li><strong>Container Adapter</strong>: Built on deque (or list)</li>
<li><strong>Type Safe</strong>: Templated for any type</li>
<li><strong>STL Compatible</strong>: Same interface as std::queue</li>
</ul>
<h2 id="quick-example">Quick Example</h2>
<pre><code class="language-cpp">Queue&lt;int&gt; q;
q.push(10);
q.push(20);
q.push(30);

std::cout &lt;&lt; q.front();  // 10 (first in)
q.pop();
std::cout &lt;&lt; q.front();  // 20
</code></pre>
<h2 id="operations">Operations</h2>
<ul>
<li><code>push(value)</code> - Add element to back (O(1))</li>
<li><code>pop()</code> - Remove front element (O(1))</li>
<li><code>front()</code> - Access front element (O(1))</li>
<li><code>back()</code> - Access back element (O(1))</li>
<li><code>emplace(args...)</code> - Construct element in-place (O(1))</li>
<li><code>size()</code>, <code>empty()</code> - Capacity queries (O(1))</li>
<li><code>swap(other)</code> - Swap contents (O(1))</li>
</ul>
<h2 id="use-cases">Use Cases</h2>
<h3 id="1-task-scheduling">1. Task Scheduling</h3>
<pre><code class="language-cpp">Queue&lt;Task&gt; task_queue;

void schedule_task(Task t) {
    task_queue.push(t);
}

void process_tasks() {
    while (!task_queue.empty()) {
        Task t = task_queue.front();
        task_queue.pop();
        execute(t);
    }
}
</code></pre>
<h3 id="2-breadth-first-search-bfs">2. Breadth-First Search (BFS)</h3>
<pre><code class="language-cpp">void bfs(int start, const Graph&amp; graph) {
    Queue&lt;int&gt; q;
    std::vector&lt;bool&gt; visited(graph.size(), false);

    q.push(start);
    visited[start] = true;

    while (!q.empty()) {
        int node = q.front();
        q.pop();
        process(node);

        for (int neighbor : graph[node]) {
            if (!visited[neighbor]) {
                visited[neighbor] = true;
                q.push(neighbor);
            }
        }
    }
}
</code></pre>

<pre><code class="language-cpp">Queue&lt;PrintJob&gt; print_queue;

</code></pre>

<pre><code class="language-cpp">void level_order(TreeNode* root) {
    if (!root) return;

    Queue&lt;TreeNode*&gt; q;
    q.push(root);

    while (!q.empty()) {
        TreeNode* node = q.front();
        q.pop();

        std::cout &lt;&lt; node-&gt;val &lt;&lt; &quot; &quot;;

        if (node-&gt;left) q.push(node-&gt;left);
        if (node-&gt;right) q.push(node-&gt;right);
    }
}
</code></pre>

<pre><code class="language-cpp">int josephus(int n, int k) {
